<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CSync | Sovereign Portal</title>
    
    <!-- PWA Standard Meta -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">

    <!-- Dependencies -->
    <script src="assets/js/config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="assets/css/csync-hud.css">

    <style>
        /* 🛠️ INPUT FOCUS PATCH */
        input, textarea, select, button { user-select: text !important; -webkit-user-select: text !important; pointer-events: auto !important; touch-action: manipulation !important; }

        /* TAB MANAGEMENT */
        .tab-view { display: none; }
        .tab-active { display: block !important; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* INSTAGRAM STYLE BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 85px; left: 15px; right: 15px; height: 70px; z-index: 1000; border-radius: 24px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 -10px 40px rgba(0,0,0,0.6); }
        .nav-item { @apply flex flex-col items-center justify-center gap-1 transition-all duration-300; color: #475569; }
        .nav-active { color: #00f2ff !important; filter: drop-shadow(0 0 10px #00f2ff); transform: translateY(-5px); }
        .nav-label { font-size: 8px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }

        .main-viewport { flex: 1; overflow-y: auto; padding-bottom: 180px; }
        .app-footer { position: fixed; bottom: 0; left: 0; width: 100%; padding: 15px 10px calc(15px + env(safe-area-inset-bottom)); background: #000; text-align: center; font-size: 9px; font-weight: 700; border-top: 1px solid #1e293b; z-index: 900; color: #475569; }
        @media (min-width: 1024px) { #desktop-blocker { display: flex !important; } .app-wrapper { display: none; } }
    </style>
</head>
<body class="bg-[#020617] text-white">

    <!-- DESKTOP GUARD -->
    <div id="desktop-blocker" class="hidden fixed inset-0 bg-black z-[9999] flex-col items-center justify-center p-10 text-center">
        <i data-lucide="smartphone" class="w-20 h-20 text-cyan-400 mb-6"></i>
        <h1 class="text-3xl font-black uppercase">Mobile Node Required</h1>
        <p class="text-slate-500 mt-2 text-sm">CSync requires smartphone hardware for sovereign biometric binding.</p>
    </div>

    <div class="app-wrapper flex flex-col h-screen">
        <!-- SOVEREIGN HEADER -->
        <header class="flex justify-between items-center p-6 pt-10 sticky top-0 bg-[#020617] z-50">
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                <p class="text-[8px] font-black text-slate-500 uppercase tracking-widest">Cloud_Sync</p>
            </div>
            <div class="text-center">
                <h1 class="orbitron text-xl font-black tracking-tighter">CSYNC</h1>
            </div>
            <div class="w-10 h-10 rounded-full border-2 border-cyan-400 overflow-hidden shadow-lg bg-slate-900">
                <img id="u-photo-top" src="https://ui-avatars.com/api/?name=CS&background=020617&color=00f2ff" class="w-full h-full object-cover">
            </div>
        </header>

        <main class="main-viewport px-5">
            <!-- STATUS PILL -->
            <div id="status-pill" class="glass py-2 px-6 rounded-full text-center text-[9px] font-black uppercase tracking-widest mb-8 text-slate-500 border-slate-800">
                Authenticating Node...
            </div>

            <!-- VIEW: ENROLLMENT (Registration) -->
            <div id="view-roles" class="hidden tab-view flex flex-col space-y-4">
                <h2 class="text-center text-[10px] font-black text-slate-600 uppercase mb-4 tracking-widest">Select Identity</h2>
                <button onclick="UIManager.openReg('Student')" class="glass p-6 rounded-3xl text-left border-l-4 border-cyan-500 active:scale-95 transition">
                    <h4 class="font-black text-lg uppercase">Student</h4>
                </button>
                <button onclick="UIManager.openReg('Alumni')" class="glass p-6 rounded-3xl text-left border-l-4 border-emerald-500 active:scale-95 transition">
                    <h4 class="font-black text-lg uppercase text-emerald-400">Alumni</h4>
                </button>
                <button onclick="UIManager.openReg('Lecturer')" class="glass p-6 rounded-3xl text-left border-l-4 border-indigo-500 active:scale-95 transition">
                    <h4 class="font-black text-lg uppercase text-indigo-400">Lecturer</h4>
                </button>
                <button onclick="UIManager.openReg('HOD')" class="glass p-6 rounded-3xl text-left border-l-4 border-purple-500 active:scale-95 transition">
                    <h4 class="font-black text-lg uppercase">HOD</h4>
                </button>
            </div>

            <!-- REGISTRATION FORM -->
            <div id="view-register" class="hidden tab-view space-y-6">
                <div class="glass p-8 rounded-[2.5rem] cyber-card text-center">
                    <h2 id="reg-title" class="text-xl font-black text-cyan-400 uppercase mb-6 italic">Enrollment</h2>
                    <div class="video-circle mb-8"><video id="v-reg" autoplay muted playsinline></video></div>
                    <canvas id="c-resize" class="hidden"></canvas>
                    <div class="space-y-4">
                        <input id="r-id" type="text" placeholder="ID / Employee ID" class="input-vivid uppercase">
                        <input id="r-name" type="text" placeholder="Full Name" class="input-vivid">
                        <div id="stu-fields" class="hidden space-y-4">
                            <select id="r-major" class="input-vivid text-xs"><option>Computer Science</option><option>Artificial Intelligence</option></select>
                            <select id="r-year" class="input-vivid text-xs"><option value="1">1st Year</option><option value="2">2nd Year</option><option value="3">3rd Year</option><option value="4">4th Year</option></select>
                        </div>
                        <button onclick="UIManager.processRegistration()" class="btn-action w-full">Bind Biometrics</button>
                    </div>
                </div>
            </div>

            <!-- TAB 1: DASHBOARD (Home) -->
            <div id="view-dashboard" class="tab-view space-y-6">
                <!-- AI COMMAND TERMINAL -->
                <div class="glass p-5 rounded-[2.5rem] border-indigo-500/30">
                    <div class="flex items-center gap-2 mb-3">
                        <div class="w-1.5 h-1.5 bg-cyan-400 rounded-full animate-pulse"></div>
                        <h4 class="text-[8px] font-black uppercase text-cyan-400 tracking-widest">Sovereign AI Terminal</h4>
                    </div>
                    <textarea id="ai-input" class="w-full bg-black/40 p-4 rounded-xl text-xs font-mono text-cyan-100 outline-none h-24 border border-white/5" placeholder="Command logic..."></textarea>
                    <button onclick="UIManager.executeAI()" class="mt-2 text-cyan-400 font-bold text-[9px] uppercase tracking-widest flex items-center gap-2 active:scale-95 transition-all"><i data-lucide="terminal" class="w-3 h-3"></i> Execute_Command</button>
                    <div id="ai-response" class="hidden mt-3 p-3 bg-black/60 rounded-xl text-[9px] font-mono text-slate-400 border border-white/5"></div>
                </div>

                <!-- Action Gate -->
                <div id="module-attendance" class="glass p-10 rounded-[3rem] text-center cyber-card space-y-6">
                    <i data-lucide="fingerprint" class="w-12 h-12 mx-auto text-cyan-400"></i>
                    <button onclick="UIManager.triggerAuth()" class="btn-action">Verify Daily Presence</button>
                </div>

                <div id="module-lab" class="hidden-view glass p-10 rounded-[3rem] text-center border-t-4 border-emerald-500">
                    <button onclick="UIManager.startLabScan()" class="btn-action !bg-white !text-black">Scan Lab PC QR</button>
                    <div id="qr-reader" class="mt-4 rounded-3xl overflow-hidden shadow-2xl"></div>
                </div>
            </div>

            <!-- TAB 2: NEXUS (Directory) -->
            <div id="view-nexus" class="tab-view space-y-6">
                <h2 class="text-xl font-black text-indigo-400 uppercase tracking-tighter">Nexus Directory</h2>
                <div id="nexus-container" class="grid grid-cols-1 gap-4"></div>
            </div>

            <!-- TAB 3: DISCUSS (Feed) -->
            <div id="view-discuss" class="tab-view space-y-6">
                <h2 class="text-xl font-black text-purple-400 uppercase tracking-tighter">Discussion Feed</h2>
                <div id="discuss-feed" class="space-y-4"></div>
            </div>

            <!-- TAB 4: ACADEMIC ARCHITECT (Staff Only) -->
            <div id="view-architect" class="tab-view space-y-6">
                <h2 class="text-xl font-black text-indigo-400 uppercase tracking-tighter">AI Architect</h2>
                <div class="glass p-6 rounded-3xl border-l-4 border-indigo-500">
                    <h3 class="font-black text-sm uppercase text-indigo-400 mb-4">Teaching Planner</h3>
                    <textarea id="syllabus-in" class="w-full bg-white/5 p-4 rounded-xl text-xs outline-none h-32" placeholder="Paste syllabus..."></textarea>
                    <button onclick="UIManager.genTeachingPlan()" class="btn-action mt-4 !bg-indigo-600 !text-white">Generate 2-Page PDF</button>
                </div>
            </div>

        </main>

        <!-- 📱 INSTAGRAM STYLE BOTTOM NAVIGATION -->
        <nav id="nav-bar" class="hidden-view bottom-nav glass">
            <button onclick="UIManager.switchTab('dashboard')" id="btn-dashboard" class="nav-item nav-active">
                <i data-lucide="home"></i>
                <span class="nav-label">Home</span>
            </button>
            <button onclick="UIManager.switchTab('nexus')" id="btn-nexus" class="nav-item">
                <i data-lucide="users"></i>
                <span class="nav-label">Nexus</span>
            </button>
            <button onclick="UIManager.switchTab('discuss')" id="btn-discuss" class="nav-item">
                <i data-lucide="message-square"></i>
                <span class="nav-label">Feed</span>
            </button>
            <button onclick="UIManager.switchTab('architect')" id="btn-architect" class="nav-item hidden">
                <i data-lucide="sparkles"></i>
                <span class="nav-label">Tools</span>
            </button>
        </nav>

        <!-- FOOTER -->
        <footer class="app-footer dynamic-footer"></footer>
    </div>

    <!-- AI VISION OVERLAY -->
    <div id="face-gate" class="hidden fixed inset-0 z-[2000] bg-black/95 flex flex-col items-center justify-center p-10 text-center pointer-events-auto">
        <div class="video-circle mb-8"><video id="v-auth" autoplay muted playsinline></video></div>
        <h3 id="face-status" class="text-cyan-400 font-black uppercase text-xs animate-pulse tracking-widest">Validating Identity...</h3>
    </div>

    <!-- Logic Layers -->
    <script src="assets/js/cloud-sync.js"></script>
    <script src="assets/js/auth-engine.js"></script>
    <script src="assets/js/scanner.js"></script>
    <script src="assets/js/ui-manager.js"></script>
</body>
</html>
