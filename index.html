<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CSync | Sovereign Portal</title>
    
    <!-- PWA Setup -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <!-- AI vision loaded from high-speed CDN -->
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

    <style>
        :root { --accent: #00f2ff; --bg: #020617; --card: rgba(255, 255, 255, 0.03); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: white; user-select: none; overflow: hidden; margin: 0; }

        /* 🛡️ INPUT FOCUS PATCH */
        input, textarea, select, button { user-select: text !important; -webkit-user-select: text !important; pointer-events: auto !important; touch-action: manipulation !important; }

        .glass { background: var(--card); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; }
        .cyber-card { border-top: 3px solid var(--accent); box-shadow: 0 20px 50px rgba(0, 242, 255, 0.1); }
        .app-wrapper { height: 100vh; display: flex; flex-direction: column; padding: 20px; padding-top: calc(env(safe-area-inset-top) + 10px); }
        .main-viewport { flex: 1; overflow-y: auto; padding-bottom: 160px; }
        
        .bottom-nav { position: fixed; bottom: 85px; left: 15px; right: 15px; height: 65px; z-index: 1000; border-radius: 24px; display: flex; justify-content: space-around; align-items: center; background: rgba(10, 11, 30, 0.9); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(15px); }
        .nav-item { color: #475569; display: flex; flex-direction: column; align-items: center; font-size: 8px; font-weight: 800; text-transform: uppercase; transition: 0.3s; border: none; background: none; }
        .nav-active { color: var(--accent) !important; filter: drop-shadow(0 0 8px var(--accent)); transform: translateY(-3px); }

        .video-circle { width: 180px; height: 180px; border-radius: 50%; overflow: hidden; border: 4px solid var(--accent); margin: 0 auto; background: black; position: relative;}
        video { width: 100%; height: 100%; object-fit: cover; }

        .btn-action { background: var(--accent); color: #000; font-weight: 900; padding: 16px; border-radius: 14px; width: 100%; text-transform: uppercase; border: none; cursor: pointer; font-size: 11px; letter-spacing: 1px; }
        .btn-action:disabled { background: #1e293b; color: #475569; opacity: 0.5; }
        
        .hidden-view { display: none !important; }
        .app-footer { position: fixed; bottom: 0; left: 0; width: 100%; padding: 15px 10px calc(15px + env(safe-area-inset-bottom)); background: #000; text-align: center; font-size: 9px; font-weight: 700; border-top: 1px solid #1e293b; z-index: 900; color: #475569; }
        a { color: var(--accent); text-decoration: underline; font-weight: 800; }
        @media (min-width: 1024px) { #desktop-blocker { display: flex !important; } .app-wrapper { display: none; } }
    </style>
</head>
<body>

    <div id="desktop-blocker" class="hidden fixed inset-0 bg-black z-[9999] flex-col items-center justify-center p-10 text-center">
        <i data-lucide="smartphone" class="w-20 h-20 text-cyan-400 mb-6"></i>
        <h1 class="text-2xl font-black uppercase text-white">Mobile Required</h1>
        <p class="text-slate-500 mt-4 text-sm max-w-sm">Please install CSync on your smartphone to access biometric and GPS security layers.</p>
    </div>

    <div class="app-wrapper">
        <header class="flex justify-between items-center mb-6">
            <div class="w-10"><i data-lucide="shield-check" class="text-cyan-400"></i></div>
            <div class="text-center">
                <p class="text-[7px] font-bold text-slate-500 uppercase tracking-widest">Dr. V.S. Krishna GDC (A)</p>
                <h1 style="font-family:'Orbitron'" class="text-xl font-bold tracking-tighter uppercase">CSYNC</h1>
            </div>
            <div class="w-10 h-10 rounded-full border border-cyan-400 overflow-hidden bg-slate-900">
                <img id="u-photo-top" src="https://ui-avatars.com/api/?name=CS&background=020617&color=00f2ff" class="w-full h-full object-cover">
            </div>
        </header>

        <div id="status-pill" class="glass py-2 px-6 rounded-full text-center text-[9px] font-black uppercase tracking-widest mb-6 text-slate-500 border-slate-800">
            Node Standby...
        </div>

        <main class="main-viewport px-2">
            
            <!-- 1. VIEW: ROLE SELECTION -->
            <div id="view-roles" class="hidden-view flex flex-col space-y-4 pt-4">
                <h2 class="text-center text-[10px] font-black text-slate-600 uppercase mb-4 tracking-widest">Identify Your Node</h2>
                <button onclick="pickRole('Student')" class="glass p-6 rounded-3xl text-left border-l-4 border-cyan-500 active:scale-95 transition">
                    <h4 class="font-black text-lg">STUDENT</h4>
                    <p class="text-[9px] text-slate-400 uppercase font-bold">Mark Attendance & Labs</p>
                </button>
                <button onclick="pickRole('Lecturer')" class="glass p-6 rounded-3xl text-left border-l-4 border-indigo-500 active:scale-95 transition">
                    <h4 class="font-black text-lg">LECTURER</h4>
                    <p class="text-[9px] text-slate-400 uppercase font-bold">Academic Tools & Approvals</p>
                </button>
                <button onclick="pickRole('LabAssistant')" class="glass p-6 rounded-3xl text-left border-l-4 border-emerald-500 active:scale-95 transition">
                    <h4 class="font-black text-lg">LAB ASST</h4>
                </button>
                <button onclick="pickRole('HOD')" class="glass p-6 rounded-3xl text-left border-l-4 border-purple-500 active:scale-95 transition">
                    <h4 class="font-black text-lg">HOD</h4>
                </button>
            </div>

            <!-- 2. VIEW: ENROLLMENT FORM -->
            <div id="view-register" class="hidden-view space-y-6">
                <div class="glass p-8 rounded-[2.5rem] cyber-card text-center">
                    <h2 id="reg-title" class="text-lg font-black text-cyan-400 uppercase mb-6">Enrollment</h2>
                    <div class="video-circle mb-8"><video id="v-reg" autoplay muted playsinline></video></div>
                    <canvas id="c-resize" class="hidden"></canvas>
                    <div class="space-y-4 text-left">
                        <input id="r-id" type="text" placeholder="Roll Number" class="w-full">
                        <input id="r-name" type="text" placeholder="Full Name" class="w-full">
                        <div id="stu-fields" class="hidden space-y-4">
                            <select id="r-major" class="w-full"><option>Computer Science</option><option>Artificial Intelligence</option></select>
                            <select id="r-year" class="w-full"><option value="1">1st Year</option><option value="2">2nd Year</option><option value="3">3rd Year</option><option value="4">4th Year</option></select>
                        </div>
                        <button onclick="handleEnrollment()" class="btn-action w-full mt-4">Bind Biometrics & Device</button>
                    </div>
                </div>
            </div>

            <!-- 3. VIEW: DASHBOARD (Home Tab) -->
            <div id="tab-dashboard" class="hidden-view space-y-6">
                <!-- AI TERMINAL -->
                <div class="glass p-5 rounded-[2.5rem] border-indigo-500/30">
                    <textarea id="ai-input" class="w-full bg-black/40 p-4 rounded-xl text-xs font-mono text-cyan-100 outline-none h-20 border border-white/5" placeholder="Command CSync AI..."></textarea>
                    <button onclick="executeAI()" class="mt-2 text-cyan-400 font-bold text-[9px] uppercase tracking-widest flex items-center gap-2 active:scale-95 transition-all">Execute_Logic</button>
                    <div id="ai-response" class="hidden mt-3 p-3 bg-black/60 rounded-xl text-[9px] font-mono text-slate-400 leading-relaxed border border-white/5"></div>
                </div>

                <!-- Identity Bento Card -->
                <div class="flex items-center gap-4 bg-white/5 p-4 rounded-2xl border border-white/10">
                    <img id="u-photo" src="" class="w-14 h-14 rounded-full border-2 border-cyan-500 object-cover bg-slate-900 shadow-xl">
                    <div class="text-left">
                        <h4 id="u-name" class="font-black text-sm uppercase">Candidate</h4>
                        <p id="u-meta" class="text-[8px] text-slate-500 uppercase font-black tracking-widest"></p>
                    </div>
                </div>

                <!-- Attendance Card with Geofence -->
                <div id="card-attendance" class="glass p-10 rounded-[3rem] text-center cyber-card space-y-6">
                    <i data-lucide="map-pin" id="geo-icon" class="w-12 h-12 mx-auto text-slate-600"></i>
                    <p id="geo-msg" class="text-[9px] font-bold uppercase text-slate-500">Syncing GPS Location...</p>
                    <button id="btn-attendance" onclick="runAttendance()" disabled class="btn-action">Verify Daily Presence</button>
                </div>

                <div id="card-lab-handshake" class="hidden-view glass p-10 rounded-[3rem] text-center border-t-4 border-emerald-500">
                    <h2 class="text-emerald-400 font-black text-xl mb-4 italic uppercase">Identity Verified</h2>
                    <button onclick="openPCScanner()" class="btn-action !bg-white !text-black">Scan Lab PC QR</button>
                    <div id="qr-reader" class="mt-4 rounded-2xl overflow-hidden shadow-2xl"></div>
                </div>
            </div>

            <!-- TAB 2: NEXUS (Static Placeholder) -->
            <div id="tab-nexus" class="hidden-view space-y-6">
                <h2 class="text-xl font-black text-indigo-400 uppercase tracking-tighter">Nexus Directory</h2>
                <div id="nexus-list" class="space-y-3"></div>
            </div>
        </main>

        <nav id="nav-bar" class="hidden-view bottom-nav">
            <button onclick="switchTab('dashboard')" id="btn-dashboard" class="nav-item nav-active"><i data-lucide="shield-check"></i><span class="mt-1">Home</span></button>
            <button onclick="switchTab('nexus')" id="btn-nexus" class="nav-item"><i data-lucide="users"></i><span class="mt-1">Nexus</span></button>
            <button onclick="switchTab('discuss')" id="btn-discuss" class="nav-item"><i data-lucide="message-square"></i><span class="mt-1">Feed</span></button>
        </nav>

        <footer class="app-footer"></footer>
    </div>

    <!-- AI VISION OVERLAY -->
    <div id="face-gate" class="hidden fixed inset-0 z-[2000] bg-black/95 flex flex-col items-center justify-center p-10 text-center pointer-events-auto">
        <div class="video-circle mb-8"><video id="v-auth" autoplay muted playsinline></video></div>
        <h3 id="face-status" class="text-cyan-400 font-black uppercase text-xs animate-pulse tracking-widest">Scanning Identity...</h3>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycby_wVsgkv7YrahCD_8y_bNl85LqQJO4zRKH7ilSmZPinvatTeFOuHwyYKtM4WaG4kUy/exec";
        const CAMPUS = { lat: 17.7441, lng: 83.3102 }; 
        const UUID = btoa(navigator.userAgent + screen.width);
        let USER = JSON.parse(localStorage.getItem('csync_v4_user'));
        let regRole = "";

        // --- 1. CORE ENGINE BOOT ---
        async function init() {
            lucide.createIcons();
            if (!USER) {
                switchView('view-roles');
            } else {
                switchTab('dashboard');
                document.getElementById('nav-bar').classList.remove('hidden-view');
                document.getElementById('u-name').innerText = USER.name;
                document.getElementById('u-photo').src = USER.photo;
                document.getElementById('u-photo-top').src = USER.photo;
                document.getElementById('u-meta').innerText = USER.role === 'Student' ? `${USER.year} Year | ${USER.major}` : USER.role;
                startGeofencing();
            }
        }

        function switchView(id) {
            document.querySelectorAll('main > div').forEach(v => v.classList.add('hidden-view'));
            document.getElementById(id).classList.remove('hidden-view');
        }

        function switchTab(t) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('nav-active'));
            document.getElementById('btn-'+t).classList.add('nav-active');
            switchView('tab-'+t);
            lucide.createIcons();
        }

        // --- 2. ENROLLMENT ---
        function pickRole(role) {
            regRole = role;
            switchView('view-register');
            document.getElementById('reg-title').innerText = role + " Enrollment";
            document.getElementById('stu-fields').classList.toggle('hidden', role !== 'Student');
            document.getElementById('r-id').placeholder = (role === 'Student' || role === 'Alumni') ? "ID (Roll No)" : "Employee ID";
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } }).then(s => document.getElementById('v-reg').srcObject = s);
        }

        async function handleEnrollment() {
            const canvas = document.getElementById('c-resize');
            const video = document.getElementById('v-reg');
            canvas.width = 120; canvas.height = 120;
            canvas.getContext('2d').drawImage(video, 0, 0, 120, 120);
            const photo = canvas.toDataURL('image/jpeg', 0.6);

            const payload = {
                action: "register", role: regRole, id: document.getElementById('r-id').value,
                name: document.getElementById('r-name').value, 
                major: document.getElementById('r-major').value || "N/A",
                year: document.getElementById('r-year').value || "0",
                uuid: UUID, photo: photo
            };

            const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
            if ((await res.text()) === "REGISTRATION_SUCCESS") {
                localStorage.setItem('csync_v4_user', JSON.stringify(payload));
                location.reload();
            }
        }

        // --- 3. GEOLOCATION (Campus Lock) ---
        function startGeofencing() {
            if (!navigator.geolocation) return;
            navigator.geolocation.watchPosition(pos => {
                const dist = Math.sqrt(Math.pow(pos.coords.latitude - CAMPUS.lat, 2) + Math.pow(pos.coords.longitude - CAMPUS.lng, 2)) * 111.32;
                const btn = document.getElementById('btn-attendance');
                const status = document.getElementById('geo-msg');
                const icon = document.getElementById('geo-icon');

                if (dist < 0.4) { // 400 Meters
                    btn.disabled = false;
                    status.innerHTML = `<span class="text-emerald-400">Location Verified: Dr. VSK GDC (A)</span>`;
                    icon.className = "w-12 h-12 mx-auto text-emerald-400 animate-bounce";
                } else {
                    btn.disabled = true;
                    status.innerHTML = `<span class="text-red-500">Access Denied: Outside Campus</span>`;
                    icon.className = "w-12 h-12 mx-auto text-red-500";
                }
            }, null, { enableHighAccuracy: true });
        }

        // --- 4. ATTENDANCE & LAB ---
        async function runAttendance() {
            document.getElementById('face-gate').classList.remove('hidden-view');
            const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
            document.getElementById('v-auth').srcObject = s;
            
            setTimeout(async () => {
                await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'attendance', id: USER.id, uuid: UUID }) });
                localStorage.setItem('marked_today', new Date().toDateString());
                document.getElementById('face-gate').classList.add('hidden-view');
                document.getElementById('card-attendance').classList.add('hidden-view');
                document.getElementById('card-lab-handshake').classList.remove('hidden-view');
            }, 3000);
        }

        function openPCScanner() {
            const scanner = new Html5Qrcode("qr-reader");
            scanner.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (url) => {
                const p = new URLSearchParams(url.split('?')[1]);
                fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'lab_unlock', id: USER.id, sysId: p.get('sysId'), mac: p.get('mac') }) });
                alert("Sign-in sent to PC " + p.get('sysId'));
                scanner.stop();
            });
        }

        async function executeAI() {
            const input = document.getElementById('ai-input');
            const resp = document.getElementById('ai-response');
            if(!input.value) return;
            resp.classList.remove('hidden'); resp.innerText = "Processing sovereign logic...";
            const res = await fetch(`${GAS_URL}?action=ai_helpdesk&query=${encodeURIComponent(input.value)}`);
            resp.innerText = await res.text();
            input.value = "";
        }

        window.onload = init;
    </script>
</body>
</html>
