<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LabConnect Master | Dr. V.S. Krishna GDC (A)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800;900&display=swap');
        :root { --primary: #4f46e5; --sidebar-w: 320px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; user-select: none; height: 100vh; width: 100vw; overflow: hidden; display: flex; }
        .sidebar { background: #000; width: var(--sidebar-w); height: 100vh; display: flex; flex-direction: column; border-right: 1px solid #1e293b; z-index: 100; }
        .main-content { flex: 1; display: flex; flex-direction: column; height: 100vh; background: #f8fafc; position: relative; }

        /* Vivid Header */
        header { height: 11vh; display: flex; align-items: center; justify-content: space-between; padding: 0 3vw; color: white; transition: 0.5s ease; }
        .header-open { background: #10b981; border-bottom: 5px solid #059669; }
        .header-closed { background: #e11d48; border-bottom: 5px solid #be123c; }

        /* Zero-Scroll Grid (8x6) */
        .grid-container { display: grid; grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(6, 1fr); gap: 1.2vh; padding: 1.5vh; height: 100%; flex: 1; }
        .system-card { border-radius: 2vh; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.3s; }
        .system-num { font-size: 5.5vh; font-weight: 900; line-height: 1; letter-spacing: -2px; }
        .occ-name { font-size: 1.3vh; font-weight: 800; text-transform: uppercase; margin-top: 0.5vh; text-align: center; width: 92%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .status-available { background: #fff; border: 0.6vh solid #10b981; color: #064e3b; } 
        .status-occupied { background: #2563eb; border: 0.6vh solid #1d4ed8; color: #fff; } 
        .status-exam { background: #f59e0b; border: 0.6vh solid #d97706; color: #000; }      
        .status-repair { background: #ef4444; border: 0.6vh solid #b91c1c; color: #fff; }    

        /* Broad Sign-In Tabs */
        .type-btn { font-size: 1.4vh; font-weight: 900; padding: 2.2vh 0; border-radius: 1.8vh; border: 3px solid #e2e8f0; background: white; transition: 0.3s; }
        .type-btn.active { background: #4f46e5; color: white; border-color: #312e81; transform: translateY(-3px); }

        .active-nav { background: #4f46e5 !important; color: #fff !important; }
        .input-field { font-size: 2vh !important; padding: 1.8vh !important; border-radius: 1.8vh !important; border: 3px solid #e2e8f0; font-weight: 700; width: 100%; outline: none; }
        
        footer { height: 5vh; background: #000; color: #00f2ff; display: flex; align-items: center; justify-content: center; font-size: 1.35vh; font-weight: 800; border-top: 1px solid #333; width: 100%; }
        #lock-screen { position: fixed; inset: 0; background: #020617; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }
        .hidden-lock { display: none !important; }
    </style>
    <script>
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = e => { if (e.keyCode == 123 || (e.ctrlKey && e.keyCode == 85)) return false; };
    </script>
</head>
<body>

    <!-- HARDWARE LOCK SCREEN -->
    <div id="lock-screen">
        <i data-lucide="shield-alert" class="w-32 h-32 text-red-500 mb-8 animate-pulse"></i>
        <h1 class="text-6xl font-black mb-4 uppercase tracking-tighter">Hardware Restricted</h1>
        <p class="text-indigo-400 text-2xl font-bold uppercase tracking-widest">Authorized Controller Required</p>
    </div>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="p-8 border-b border-white/10 text-center">
            <div class="inline-flex p-4 bg-indigo-600 rounded-3xl mb-4 shadow-2xl"><i data-lucide="monitor" class="w-10 h-10 text-white"></i></div>
            <h1 class="text-lg font-black uppercase text-white leading-tight">Dr. V.S. Krishna</h1>
            <p class="text-[10px] text-indigo-400 font-bold uppercase tracking-widest mt-1">Govt. College (A)</p>
        </div>
        <nav class="flex-1 px-4 py-8 space-y-3">
            <button onclick="showPage('checkin')" id="nav-checkin" class="active-nav w-full flex items-center gap-4 p-5 rounded-3xl text-slate-400 font-black transition"><i data-lucide="user-plus"></i> SIGN IN</button>
            <button onclick="showPage('checkout')" id="nav-checkout" class="w-full flex items-center gap-4 p-5 rounded-3xl text-slate-400 font-black transition hover:bg-white/5"><i data-lucide="log-out"></i> SIGN OUT</button>
            <button onclick="showPage('layout')" id="nav-layout" class="w-full flex items-center gap-4 p-5 rounded-3xl text-slate-400 font-black transition hover:bg-white/5"><i data-lucide="layout-grid"></i> LIVE GRID</button>
            <button onclick="showPage('admin-login')" id="nav-admin-login" class="w-full flex items-center gap-4 p-5 rounded-3xl text-slate-400 font-black transition hover:bg-white/5"><i data-lucide="shield-check"></i> ADMIN</button>
        </nav>
        <div class="p-6 mx-4 mb-20 bg-white/5 rounded-[2.5rem] border border-white/10 text-center">
            <p id="clock-time" class="text-3xl font-black font-mono text-cyan-400 uppercase tracking-tighter">00:00:00 AM</p>
            <p id="clock-date" class="text-[10px] font-bold text-slate-400 uppercase mt-2 tracking-widest">---</p>
        </div>
    </aside>

    <div class="main-content">
        <header id="main-header" class="header-open">
            <div><h2 id="page-title" class="text-4xl font-black uppercase tracking-tighter italic">SIGN IN</h2><p id="header-status-msg" class="text-sm font-bold uppercase tracking-[0.4em] opacity-90">Lab is Open</p></div>
            <div id="search-container" class="hidden relative w-[450px]">
                <i data-lucide="search" class="absolute left-6 top-1/2 -translate-y-1/2 w-6 h-6 text-slate-400"></i>
                <input type="text" id="stu-search" onkeyup="filterGrid()" placeholder="SEARCH ROLL NO / NAME..." class="w-full pl-16 pr-8 py-5 rounded-3xl border-none bg-white shadow-2xl font-black uppercase text-slate-900 outline-none">
            </div>
        </header>

        <section class="flex-1 relative overflow-hidden">
            <!-- PAGE: SIGN IN -->
            <div id="page-checkin" class="absolute inset-0 flex items-center justify-center p-10">
                <div class="w-[900px] glass p-14 rounded-[4.5rem] shadow-2xl border-t-[1.8vh] border-indigo-600">
                    <div class="grid grid-cols-5 gap-2 mb-8">
                        <button onclick="setType('CS')" id="t-CS" class="type-btn active">CS Major</button>
                        <button onclick="setType('AI')" id="t-AI" class="type-btn">AI Major</button>
                        <button onclick="setType('Minor')" id="t-Minor" class="type-btn">Minor</button>
                        <button onclick="setType('CSLecturer')" id="t-CSLecturer" class="type-btn">CS Lecturer</button>
                        <button onclick="setType('Guest')" id="t-Guest" class="type-btn">Guest</button>
                    </div>
                    <!-- Form Wrapper to capture ENTER key -->
                    <form id="checkin-form" onsubmit="handleSignIn(event)" class="space-y-8">
                        <div id="std-fields" class="grid grid-cols-2 gap-8">
                            <select id="in-year" class="input-field bg-white"></select>
                            <select id="in-sem" class="input-field bg-white"><option>Semester 1</option><option>Semester 2</option><option>Semester 3</option><option>Semester 4</option><option>Semester 5</option><option>Semester 6</option><option>Semester 7</option><option>Semester 8</option></select>
                            <input type="text" id="in-name" placeholder="ENTER FULL NAME" class="col-span-2 input-field">
                            <input type="text" id="in-roll" placeholder="ROLL / REGISTRATION NO" class="col-span-2 input-field uppercase">
                        </div>
                        <div id="minor-fields" class="hidden"><select id="in-subject" class="input-field text-indigo-700 font-black"><option value="Mathematics">Mathematics</option><option value="Electronics">Electronics</option></select></div>
                        <div id="lecturer-fields" class="hidden"><input type="text" id="in-fac-name" placeholder="CS LECTURER NAME" class="input-field font-black"></div>
                        <div id="guest-fields" class="hidden space-y-6"><input type="text" id="in-guest-name" placeholder="GUEST NAME" class="input-field"><input type="text" id="in-org" placeholder="ORGANIZATION" class="input-field"></div>
                        <div class="pt-6 border-t-4 border-slate-100 text-center"><label class="text-xs font-black text-slate-400 uppercase tracking-widest block mb-2">STATION ID</label><input type="text" id="in-sys-display" class="w-full bg-transparent font-black text-indigo-700 text-7xl text-center border-none outline-none" readonly></div>
                        <button type="submit" id="btn-submit" class="w-full bg-indigo-600 text-white font-black py-7 rounded-[3rem] shadow-2xl hover:bg-indigo-700 uppercase tracking-widest text-3xl transition">SIGN IN</button>
                    </form>
                </div>
            </div>

            <!-- PAGE: SIGN OUT -->
            <div id="page-checkout" class="hidden absolute inset-0 flex items-center justify-center">
                <form onsubmit="handleCheckOutAction(event)" class="w-[600px] glass p-20 rounded-[5rem] shadow-2xl text-center border-b-[2.5vh] border-orange-500">
                    <i data-lucide="log-out" class="w-32 h-32 mx-auto text-orange-500 animate-pulse mb-10"></i>
                    <h3 class="text-5xl font-black text-slate-800 uppercase tracking-tighter mb-10">End Session</h3>
                    <input type="text" id="out-sys-display" class="w-full p-10 rounded-[3rem] bg-slate-100 font-black text-8xl text-center text-orange-600 shadow-inner border-none outline-none mb-10" readonly>
                    <button type="submit" id="btn-checkout-submit" class="w-full bg-orange-600 text-white font-black py-8 rounded-[3rem] shadow-2xl text-3xl uppercase">SIGN OUT</button>
                </form>
            </div>

            <div id="page-layout" class="hidden h-full"><div class="grid-container" id="lab-grid"></div></div>

            <!-- ADMIN PIN PAGE -->
            <div id="page-admin-login" class="hidden absolute inset-0 flex items-center justify-center">
                <form onsubmit="handleAdminVerify(event)" class="glass p-20 rounded-[5rem] shadow-2xl text-center w-[550px] border-t-[2vh] border-slate-900">
                    <i data-lucide="shield-check" class="w-24 h-24 mx-auto mb-10 text-indigo-600"></i>
                    <h3 class="text-4xl font-black mb-10 text-slate-800 uppercase tracking-tighter">Lecturer PIN</h3>
                    <input type="password" id="admin-pin" placeholder="••••" class="w-full p-8 rounded-[3rem] border-4 border-slate-100 mb-10 text-center text-8xl tracking-[0.5em] outline-none font-black bg-slate-50">
                    <button type="submit" class="w-full bg-slate-900 text-white font-black py-8 rounded-[3rem] text-3xl uppercase shadow-2xl">Verify</button>
                </form>
            </div>

            <div id="page-admin-dash" class="hidden p-12 h-full flex flex-col justify-center items-center gap-12">
                <div class="glass p-12 rounded-[4rem] flex flex-col gap-8 shadow-2xl border-l-[15px] border-emerald-600">
                    <button onclick="exportData('xlsx')" class="bg-emerald-600 text-white px-24 py-8 rounded-[3rem] font-black uppercase text-2xl shadow-xl hover:bg-emerald-700">EXPORT EXCEL LOG</button>
                </div>
            </div>
        </section>

        <footer>© <span id="foot-year"></span> M. THRINADH, LECTURER, DEPT OF COMPUTER SCIENCE, DR. V. S. KRISHNA GOVT. DEGREE COLLEGE (A). ALL RIGHTS RESERVED.</footer>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbworz63t_h5Y90GfiH3kQVQX3H77om2PT7c8UDIKVufWj5YwNK71Ik5q0C7588Db64s/exec";
        let state = {}; let rawHistory = []; let loginType = 'CS'; let DEVICE_MAC = ""; let ASSIGNED_SYS = "";

        function handleHardwareBinding() {
            const p = new URLSearchParams(window.location.search);
            DEVICE_MAC = p.get('mac'); ASSIGNED_SYS = p.get('sysId');
            if(DEVICE_MAC && ASSIGNED_SYS) {
                document.getElementById('lock-screen').classList.add('hidden-lock');
                document.getElementById('in-sys-display').value = ASSIGNED_SYS;
                document.getElementById('out-sys-display').value = ASSIGNED_SYS;
                if(p.get('page') === 'checkout') showPage('checkout');
            }
        }

        function getIST() {
            const now = new Date();
            const df = new Intl.DateTimeFormat('en-GB', { timeZone: 'Asia/Kolkata', hour12: true, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const lf = new Intl.DateTimeFormat('en-GB', { timeZone: 'Asia/Kolkata', hour12: false, year: 'numeric', month: 'numeric', day: 'numeric', hour: 'numeric', minute: 'numeric', second: 'numeric', weekday: 'short' });
            const p = lf.formatToParts(now).reduce((acc, part) => ({ ...acc, [part.type]: part.value }), {});
            return { hrs24: parseInt(p.hour), mo: parseInt(p.month), yr: parseInt(p.year), dy: parseInt(p.day), wk: p.weekday, timeStr: df.format(now) };
        }

        function checkStatus() {
            const ist = getIST(); let closed = false;
            document.getElementById('foot-year').innerText = ist.yr;
            if (ist.hrs24 >= 17 || ist.hrs24 < 10 || ist.mo === 5 || ist.wk === "Sun") closed = true;
            document.getElementById('clock-time').innerText = ist.timeStr;
            document.getElementById('clock-date').innerText = `${ist.dy}/${ist.mo}/${ist.yr} (${ist.wk})`;
            const header = document.getElementById('main-header');
            header.className = closed ? 'header-closed' : 'header-open';
            document.getElementById('header-status-msg').innerText = closed ? "Lab Closed" : "Lab Open";
            document.getElementById('btn-submit').disabled = closed;
            return closed;
        }

        function setupGrid() {
            const grid = document.getElementById('lab-grid');
            for (let i = 1; i <= 48; i++) {
                const id = `CS-${String(i).padStart(2, '0')}`;
                state[id] = { status: 'available' };
                const box = document.createElement('div');
                box.id = `grid-${id}`; box.className = "system-card status-available font-black shadow-sm";
                box.innerHTML = `<div class="system-num">${id.split('-')[1]}</div><div class="occ-name">FREE</div>`;
                grid.appendChild(box);
            }
            const yrSel = document.getElementById('in-year');
            const ist = getIST();
            const startYear = (ist.mo >= 6) ? ist.yr : ist.yr - 1;
            const opt = document.createElement('option'); opt.value = `${startYear}-${startYear+1}`; opt.innerText = `${startYear}-${startYear+1}`; yrSel.appendChild(opt);
            setType('CS');
        }

        function setType(t) {
            loginType = t; document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`t-${t}`).classList.add('active');
            document.getElementById('std-fields').classList.toggle('hidden', ['Guest', 'CSLecturer'].includes(t));
            document.getElementById('minor-fields').classList.toggle('hidden', t !== 'Minor');
            document.getElementById('lecturer-fields').classList.toggle('hidden', t !== 'CSLecturer');
            document.getElementById('guest-fields').classList.toggle('hidden', t !== 'Guest');
        }

        function showPage(p) {
            ['checkin', 'checkout', 'layout', 'admin-login', 'admin-dash'].forEach(id => {
                const el = document.getElementById(`page-${id}`);
                if(el) el.classList.add('hidden');
            });
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav'));
            document.getElementById(`page-${p}`).classList.remove('hidden');
            document.getElementById(`nav-${p}`).classList.add('active-nav');
            if (p === 'layout') syncData();
            lucide.createIcons();
        }

        async function syncData() {
            try {
                const res = await fetch(SCRIPT_URL); const data = await res.json();
                const latestMap = {};
                data.forEach(log => {
                    const sysId = log.SystemID;
                    if (!latestMap[sysId] || log.Timestamp > latestMap[sysId].Timestamp) latestMap[sysId] = log;
                });
                Object.keys(state).forEach(id => {
                    const log = latestMap[id]; const ist = getIST();
                    if (ist.hrs24 >= 17 || ist.hrs24 < 10) state[id] = { status: 'available', name: 'FREE' };
                    else if (log && log.Type !== 'Logout') state[id] = { status: log.Type === 'Exam' ? 'exam' : log.Type === 'Repair' ? 'repair' : 'occupied', name: log.StudentName };
                    else state[id] = { status: 'available', name: 'FREE' };
                    const el = document.getElementById(`grid-${id}`);
                    el.className = `system-card status-${state[id].status} shadow-md`;
                    el.querySelector('.occ-name').innerText = state[id].name;
                });
            } catch (e) { }
        }

        // SUBMIT HANDLERS
        async function handleSignIn(e) {
            e.preventDefault();
            if(checkStatus()) return alert("Lab Closed");
            const btn = document.getElementById('btn-submit'); btn.disabled = true; btn.innerText = "AUTHENTICATING...";
            const ist = getIST(); let name = document.getElementById('in-name').value; let roll = document.getElementById('in-roll').value;
            if (loginType === 'CSLecturer') { name = "LECTURER: " + document.getElementById('in-fac-name').value; roll = "FACULTY"; }
            if (loginType === 'Guest') { name = "GUEST: " + document.getElementById('in-guest-name').value + " (" + document.getElementById('in-org').value + ")"; roll = "GUEST"; }
            if (loginType === 'Minor') name += " (" + document.getElementById('in-subject').value + ")";
            const p = { sysId: ASSIGNED_SYS, mac: DEVICE_MAC, time: ist.timeStr, type: loginType, year: document.getElementById('in-year').value || '---', sem: document.getElementById('in-sem').value || '---', name, roll };
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(p) });
            alert("Sign-In Successful! Desktop Unlocked.");
            location.reload();
        }

        async function handleCheckOutAction(e) {
            e.preventDefault();
            const ist = getIST();
            const p = { year: '---', sem: '---', name: '---', roll: '---', sysId: ASSIGNED_SYS, mac: DEVICE_MAC, time: ist.timeStr, type: 'Logout' };
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(p) });
            alert("Signed Out! Desktop Locking...");
            location.reload();
        }

        function handleAdminVerify(e) {
            e.preventDefault();
            if(btoa(document.getElementById('admin-pin').value) === "dnNrYWRtaW4=") showPage('admin-dash');
            else alert("PIN Invalid");
        }

        function exportData(fmt) {
            const ws = XLSX.utils.json_to_sheet(rawHistory); const wb = XLSX.utils.book_new(); 
            XLSX.utils.book_append_sheet(wb, ws, "Attendance"); 
            if(fmt === 'xlsx') XLSX.writeFile(wb, "LabReport.xlsx");
        }

        setInterval(checkStatus, 1000);
        window.onload = () => { handleHardwareBinding(); setupGrid(); checkStatus(); syncData(); lucide.createIcons(); };
    </script>
</body>
</html>
