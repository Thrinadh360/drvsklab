<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CSYNC | Sovereign Unified Hub</title>
    
    <!-- PWA & Native App Meta -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#020617">

    <!-- High-Performance Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Orbitron:wght@600;900&display=swap" rel="stylesheet">

    <style>
        :root { 
            --accent: #00f2ff; 
            --bg: #020617; 
            --card: rgba(30, 41, 59, 0.4); 
            --input-bg: #1e1b4b; 
            --primary: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); color: white; 
            margin: 0; height: 100vh; width: 100vw;
            overflow: hidden;
        }

        /* Sovereign UI Components */
        .glass { background: var(--card); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        input, select, textarea {
            background: var(--input-bg) !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            border-radius: 12px !important;
            padding: 12px !important;
            color: white !important;
            width: 100%;
        }

        .btn-action {
            background: var(--accent);
            color: #000;
            font-weight: 800;
            padding: 14px;
            border-radius: 16px;
            width: 100%;
            text-transform: uppercase;
            transition: 0.2s;
        }
        .btn-action:active { transform: scale(0.98); opacity: 0.9; }
        .btn-action:disabled { background: #334155; color: #94a3b8; }

        .main-viewport { height: 100vh; overflow-y: auto; padding-bottom: 120px; }

        /* Navigation HUD */
        .bottom-nav { 
            position: fixed; bottom: 30px; left: 20px; right: 20px; 
            height: 70px; z-index: 1000; border-radius: 24px; 
            display: flex; justify-content: space-around; align-items: center; 
            background: rgba(10, 11, 30, 0.9); border: 1px solid rgba(255,255,255,0.1); 
            backdrop-filter: blur(15px);
        }
        .nav-item { color: #64748b; display: flex; flex-direction: column; align-items: center; font-size: 8px; font-weight: 800; }
        .nav-active { color: var(--accent); }

        /* View States */
        .view-container { display: none; animation: fadeIn 0.3s ease-in-out; }
        .view-active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #sidebar { 
            position: fixed; inset-y: 0; left: 0; width: 280px; 
            background: #05060f; z-index: 2000; 
            transform: translateX(-100%); transition: 0.3s; 
            border-right: 1px solid rgba(255,255,255,0.1);
        }
        #sidebar.open { transform: translateX(0); }

        .video-circle { width: 140px; height: 140px; border-radius: 50%; overflow: hidden; border: 3px solid var(--accent); margin: 0 auto 20px; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        #qr-reader { width: 100%; border-radius: 20px; overflow: hidden; display: none; }
        
        .shimmer { background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%); background-size: 200% 100%; animation: shimmer 2s infinite; }
        @keyframes shimmer { to { background-position: -200% 0; } }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <div id="sidebar" class="p-8 flex flex-col">
        <h1 class="font-black text-cyan-400 text-2xl italic mb-10 tracking-tighter uppercase font-['Orbitron']">CSYNC</h1>
        <nav class="space-y-6 flex-1">
            <button onclick="UIManager.switchTab('dashboard')" class="flex items-center gap-4 text-xs font-bold uppercase"><i data-lucide="layout-dashboard"></i> Dashboard</button>
            <button onclick="UIManager.switchTab('nexus')" class="flex items-center gap-4 text-xs font-bold uppercase"><i data-lucide="users"></i> Nexus</button>
            <button onclick="UIManager.delinkDevice()" class="text-red-500 text-xs font-bold uppercase mt-10 flex items-center gap-2"><i data-lucide="log-out"></i> Unbind Node</button>
        </nav>
    </div>

    <div class="app-wrapper flex flex-col h-screen">
        <!-- HEADER -->
        <header class="flex justify-between items-center px-6 py-5 bg-[#020617] z-50 border-b border-white/5">
            <button onclick="UIManager.toggleSidebar()" class="p-1"><i data-lucide="menu" class="text-cyan-400"></i></button>
            <div class="text-center">
                <p class="text-[6px] font-bold text-slate-500 uppercase tracking-widest">DR. VS KRISHNA GDC (A)</p>
                <h1 class="font-['Orbitron'] text-lg font-bold tracking-tighter text-white">CSYNC</h1>
            </div>
            <div class="w-8 h-8 rounded-full border border-cyan-400 overflow-hidden">
                <img id="u-photo-top" src="https://ui-avatars.com/api/?name=User&background=020617&color=00f2ff" class="w-full h-full object-cover">
            </div>
        </header>

        <main class="main-viewport px-6 pt-4">
            
            <!-- VIEW: ROLE SELECTION -->
            <div id="view-roles" class="view-container space-y-4 pt-10">
                <h2 class="text-center text-[10px] font-black text-slate-500 uppercase tracking-widest mb-6">Select Identity Node</h2>
                <button onclick="UIManager.openReg('Student')" class="glass p-6 rounded-3xl w-full text-left border-l-4 border-cyan-500">
                    <h4 class="font-black text-lg uppercase">Student</h4>
                    <p class="text-[9px] text-slate-400 uppercase font-bold">Attendance & Lab Access</p>
                </button>
                <button onclick="UIManager.openReg('Lecturer')" class="glass p-6 rounded-3xl w-full text-left border-l-4 border-indigo-500">
                    <h4 class="font-black text-lg uppercase">Lecturer</h4>
                    <p class="text-[9px] text-slate-400 uppercase font-bold">Faculty Management</p>
                </button>
            </div>

            <!-- VIEW: REGISTRATION -->
            <div id="view-register" class="view-container">
                <div class="glass p-8 rounded-[2.5rem] text-center border-t-2 border-cyan-500">
                    <h2 id="reg-title" class="text-lg font-black text-cyan-400 uppercase mb-6 italic font-['Orbitron']">Enrollment</h2>
                    <div class="video-circle"><video id="v-reg" autoplay muted playsinline></video></div>
                    <div class="space-y-4">
                        <input id="r-id" type="text" placeholder="Roll Number / Staff ID">
                        <input id="r-name" type="text" placeholder="Full Name">
                        
                        <div id="stu-fields" class="hidden space-y-4">
                            <select id="r-major"><option value="CS">Computer Science</option><option value="AI">AI & Data Science</option></select>
                            <select id="r-year"><option value="1">1st Year</option><option value="2">2nd Year</option><option value="3">3rd Year</option></select>
                        </div>

                        <button id="btn-enroll" onclick="UIManager.handleEnrollment()" class="btn-action mt-4">Bind Sovereign ID</button>
                    </div>
                </div>
            </div>

            <!-- VIEW: DASHBOARD -->
            <div id="view-dashboard" class="view-container space-y-6">
                <!-- Profile Bento -->
                <div class="flex items-center gap-4 bg-white/5 p-4 rounded-2xl border border-white/10">
                    <img id="u-photo" src="" class="w-12 h-12 rounded-full border border-cyan-500 object-cover bg-slate-900">
                    <div>
                        <h4 id="u-name" class="font-black text-sm uppercase">Candidate</h4>
                        <p id="u-meta" class="text-[8px] text-slate-500 uppercase font-black"></p>
                    </div>
                </div>

                <!-- GPS Attendance Block -->
                <div id="module-attendance" class="glass p-10 rounded-[3rem] text-center border-t-4 border-indigo-500">
                    <i data-lucide="map-pin" id="geo-icon" class="w-10 h-10 mx-auto text-slate-600 mb-4 transition-all"></i>
                    <p id="geo-msg" class="text-[10px] font-black uppercase text-slate-500 mb-6">Checking GPS Pulse...</p>
                    <button id="btn-presence" onclick="UIManager.markAttendance()" disabled class="btn-action">Verify Presence</button>
                </div>

                <!-- Lab PC QR Block -->
                <div id="module-lab" class="hidden glass p-10 rounded-[3rem] text-center border-t-4 border-emerald-500">
                    <h2 class="text-emerald-400 font-black text-lg mb-4 italic uppercase">Presence Verified</h2>
                    <p class="text-[9px] text-slate-400 uppercase mb-6 font-bold">Scan PC to begin session</p>
                    <button onclick="UIManager.startLabScan()" class="btn-action !bg-white !text-black">Scan Lab PC QR</button>
                    <div id="qr-reader" class="mt-4"></div>
                </div>

                <!-- Active Session Block -->
                <div id="module-active-pc" class="hidden glass p-10 rounded-[3rem] text-center border-t-4 border-orange-500">
                    <p class="text-[10px] text-slate-500 uppercase font-black mb-2">Active Workstation</p>
                    <h2 id="active-pc-display" class="text-5xl font-black text-white mb-8 italic">CS-00</h2>
                    <button onclick="UIManager.killSession()" class="btn-action !bg-red-600 !text-white">Close Session</button>
                </div>
            </div>

            <!-- VIEW: NEXUS -->
            <div id="view-nexus" class="view-container space-y-4">
                <h2 class="text-xl font-black text-indigo-400 uppercase italic">Nexus Directory</h2>
                <div id="nexus-list" class="space-y-3">
                    <p class="text-center text-slate-500 text-[10px] py-10 uppercase">Accessing peer nodes...</p>
                </div>
            </div>

        </main>

        <!-- NAVIGATION -->
        <nav id="nav-bar" class="bottom-nav hidden">
            <button onclick="UIManager.switchTab('dashboard')" id="btn-dashboard" class="nav-item nav-active"><i data-lucide="shield-check"></i><span class="mt-1">DASHBOARD</span></button>
            <button onclick="UIManager.switchTab('nexus')" id="btn-nexus" class="nav-item"><i data-lucide="users"></i><span class="mt-1">NEXUS</span></button>
            <button onclick="UIManager.switchTab('discuss')" id="btn-discuss" class="nav-item"><i data-lucide="message-square"></i><span class="mt-1">FEED</span></button>
            <button onclick="UIManager.switchTab('support')" id="btn-support" class="nav-item"><i data-lucide="help-circle"></i><span class="mt-1">UTILITY</span></button>
        </nav>
    </div>

    <script>
        const CAMPUS_COORDS = { lat: 17.740697, lng: 83.321251 };
        const ALLOWED_RADIUS = 0.3; // 300 meters

        let USER = JSON.parse(localStorage.getItem('csync_user'));
        let isSidebarOpen = false;
        let regRole = "";

        const UIManager = {
            init() {
                lucide.createIcons();
                if (!USER) {
                    this.switchView('view-roles');
                } else {
                    this.setupSession();
                }
            },

            toggleSidebar() {
                isSidebarOpen = !isSidebarOpen;
                document.getElementById('sidebar').classList.toggle('open', isSidebarOpen);
            },

            switchView(id) {
                document.querySelectorAll('.view-container').forEach(v => v.classList.remove('view-active'));
                document.getElementById(id).classList.add('view-active');
                this.toggleSidebar(false);
            },

            switchTab(tab) {
                const map = { 'dashboard': 'view-dashboard', 'nexus': 'view-nexus' };
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('nav-active'));
                document.getElementById('btn-' + tab)?.classList.add('nav-active');
                if (map[tab]) this.switchView(map[tab]);
                if (tab === 'nexus') this.loadNexus();
                if ("vibrate" in navigator) navigator.vibrate(10);
            },

            // REGISTRATION
            openReg(role) {
                regRole = role;
                this.switchView('view-register');
                document.getElementById('reg-title').innerText = role + " Enroll";
                document.getElementById('stu-fields').style.display = (role === 'Student') ? 'block' : 'none';
                
                navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
                    .then(s => document.getElementById('v-reg').srcObject = s);
            },

            async handleEnrollment() {
                const id = document.getElementById('r-id').value;
                const name = document.getElementById('r-name').value;
                if (!id || !name) return alert("Fill all fields");

                const canvas = document.createElement('canvas');
                const video = document.getElementById('v-reg');
                canvas.width = 150; canvas.height = 150;
                canvas.getContext('2d').drawImage(video, 0, 0, 150, 150);
                
                USER = {
                    id, name, role: regRole,
                    photo: canvas.toDataURL('image/jpeg', 0.7),
                    major: document.getElementById('r-major').value,
                    year: document.getElementById('r-year').value
                };

                localStorage.setItem('csync_user', JSON.stringify(USER));
                location.reload();
            },

            setupSession() {
                this.switchTab('dashboard');
                document.getElementById('nav-bar').classList.remove('hidden');
                document.getElementById('u-name').innerText = USER.name;
                document.getElementById('u-photo').src = USER.photo;
                document.getElementById('u-photo-top').src = USER.photo;
                document.getElementById('u-meta').innerText = USER.role === 'Student' ? `${USER.year} Year | ${USER.major}` : USER.role;
                
                this.refreshDashboard();
                this.checkLocation();
            },

            refreshDashboard() {
                const marked = localStorage.getItem('last_attendance') === new Date().toDateString();
                const activePC = localStorage.getItem('active_pc');

                document.getElementById('module-attendance').style.display = (!marked && USER.role === 'Student') ? 'block' : 'none';
                document.getElementById('module-lab').style.display = (marked && !activePC && USER.role === 'Student') ? 'block' : 'none';
                document.getElementById('module-active-pc').style.display = activePC ? 'block' : 'none';
                if(activePC) document.getElementById('active-pc-display').innerText = activePC;
            },

            // GPS
            checkLocation() {
                if (!navigator.geolocation || USER.role !== 'Student') return;
                
                navigator.geolocation.getCurrentPosition(pos => {
                    const lat1 = pos.coords.latitude;
                    const lon1 = pos.coords.longitude;
                    const p = 0.017453292519943295;
                    const c = Math.cos;
                    const a = 0.5 - c((CAMPUS_COORDS.lat - lat1) * p)/2 + c(lat1 * p) * c(CAMPUS_COORDS.lat * p) * (1 - c((CAMPUS_COORDS.lng - lon1) * p))/2;
                    const d = 12742 * Math.asin(Math.sqrt(a));

                    if (d <= ALLOWED_RADIUS + (pos.coords.accuracy/1000)) {
                        document.getElementById('btn-presence').disabled = false;
                        document.getElementById('geo-msg').innerHTML = "<span class='text-emerald-400 font-bold'>CAMPUS SIGNAL LOCKED</span>";
                        document.getElementById('geo-icon').style.color = "#10b981";
                    } else {
                        document.getElementById('geo-msg').innerHTML = `<span class='text-red-500'>OUTSIDE CAMPUS (${(d*1000).toFixed(0)}m)</span>`;
                    }
                }, null, { enableHighAccuracy: true });
            },

            markAttendance() {
                localStorage.setItem('last_attendance', new Date().toDateString());
                if ("vibrate" in navigator) navigator.vibrate([50, 30, 50]);
                this.refreshDashboard();
            },

            // QR SCAN
            startLabScan() {
                const reader = document.getElementById('qr-reader');
                reader.style.display = 'block';
                const scanner = new Html5Qrcode("qr-reader");
                
                scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
                    const pcId = new URLSearchParams(text.split('?')[1]).get('sysId') || "LAB-PC";
                    localStorage.setItem('active_pc', pcId);
                    scanner.stop();
                    reader.style.display = 'none';
                    this.refreshDashboard();
                });
            },

            killSession() {
                if(confirm("End current session?")) {
                    localStorage.removeItem('active_pc');
                    this.refreshDashboard();
                }
            },

            loadNexus() {
                const list = document.getElementById('nexus-list');
                // Display user as the first node
                list.innerHTML = `
                    <div class="glass p-4 rounded-2xl flex items-center gap-4">
                        <img src="${USER.photo}" class="w-10 h-10 rounded-full border border-cyan-500">
                        <div>
                            <h5 class="text-xs font-bold uppercase">${USER.name} (YOU)</h5>
                            <p class="text-[8px] text-slate-500 uppercase">${USER.major}</p>
                        </div>
                    </div>
                `;
            },

            delinkDevice() {
                if(confirm("Unbind identity from this node?")) {
                    localStorage.clear();
                    location.reload();
                }
            }
        };

        window.onload = () => UIManager.init();
    </script>
</body>
</html>
