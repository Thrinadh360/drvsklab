<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CSYNC | Sovereign Unified Hub</title>
    
    <!-- Core Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

    <style>
        :root { --accent: #00f2ff; --bg: #020617; --card: rgba(30, 41, 59, 0.4); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: white; margin: 0; height: 100dvh; overflow: hidden; }
        
        /* UI Components */
        .glass { background: var(--card); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); }
        .cyber-btn { background: var(--accent); color: black; font-weight: 800; border-radius: 14px; padding: 12px; transition: 0.2s; text-transform: uppercase; font-size: 11px; width: 100%; border: none; cursor: pointer; }
        .cyber-btn:active { transform: scale(0.96); }
        .cyber-btn:disabled { opacity: 0.3; filter: grayscale(1); }

        /* Navigation HUD */
        .bottom-nav { position: fixed; bottom: 20px; left: 15px; right: 15px; height: 75px; border-radius: 24px; display: flex; justify-content: space-around; align-items: center; z-index: 1000; background: rgba(10,11,30,0.95); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px); }
        .nav-item { color: #64748b; display: flex; flex-direction: column; align-items: center; font-size: 9px; font-weight: 800; background: none; border: none; }
        .nav-active { color: var(--accent); filter: drop-shadow(0 0 5px var(--accent)); }

        #sidebar { position: fixed; inset: 0; right: auto; width: 280px; background: #05060f; z-index: 2000; transform: translateX(-100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-right: 1px solid #1e293b; }
        #sidebar.open { transform: translateX(0); box-shadow: 20px 0 60px rgba(0,0,0,0.8); }

        /* View Management */
        .view-container { display: none; height: 100%; overflow-y: auto; padding-bottom: 140px; }
        .view-active { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Inputs */
        input, select, textarea { background: #1e1b4b !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; padding: 12px !important; border-radius: 12px !important; width: 100%; font-size: 14px; }
        input:focus { border-color: var(--accent) !important; }

        /* Face Auth Overlay */
        .face-gate { position: fixed; inset: 0; background: black; z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .video-box { width: 220px; height: 220px; border-radius: 50%; border: 4px solid var(--accent); overflow: hidden; margin-bottom: 20px; background: #000; position: relative; }
        .video-box::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: var(--accent); animation: scan 2s infinite linear; box-shadow: 0 0 15px var(--accent); }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <!-- BIOMETRIC VERIFICATION GATE -->
    <div id="face-gate" class="face-gate">
        <div class="video-box"><video id="auth-video" autoplay muted playsinline></video></div>
        <h2 class="font-['Orbitron'] text-cyan-400 text-lg animate-pulse uppercase tracking-tighter">Biometric Scan</h2>
        <p id="auth-status" class="text-[9px] text-slate-500 mt-2 uppercase tracking-widest">Validating Neural Link & GPS Pulse</p>
    </div>

    <!-- SIDEBAR DRAWER -->
    <div id="sidebar" class="p-8 flex flex-col">
        <h1 class="font-['Orbitron'] text-xl text-cyan-400 mb-10 italic uppercase">CSYNC</h1>
        <nav class="space-y-6 flex-1">
            <button onclick="UIManager.switchTab('dashboard')" class="flex items-center gap-4 text-xs font-bold uppercase"><i data-lucide="layout-dashboard"></i> Hub</button>
            <button onclick="UIManager.switchTab('nexus')" class="flex items-center gap-4 text-xs font-bold uppercase"><i data-lucide="users"></i> Nexus</button>
            <button onclick="UIManager.switchTab('discuss')" class="flex items-center gap-4 text-xs font-bold uppercase"><i data-lucide="message-square"></i> Feed</button>
            <button onclick="UIManager.switchTab('leave')" class="flex items-center gap-4 text-xs font-bold uppercase"><i data-lucide="calendar-days"></i> Leave</button>
        </nav>
        <button onclick="UIManager.logout()" class="text-red-500 font-bold text-[10px] uppercase flex items-center gap-2 mt-auto"><i data-lucide="log-out"></i> Unbind Device</button>
    </div>

    <div class="flex flex-col h-full">
        <!-- HEADER -->
        <header class="flex justify-between items-center px-6 py-5 bg-[#020617] border-b border-white/5 z-50">
            <button onclick="UIManager.toggleSidebar()"><i data-lucide="menu" class="text-cyan-400"></i></button>
            <div class="text-center">
                <p class="text-[6px] text-slate-500 tracking-widest font-bold uppercase">Sovereign Unified Hub</p>
                <h1 class="font-['Orbitron'] text-lg text-white font-black tracking-tighter">CSYNC</h1>
            </div>
            <div class="w-9 h-9 rounded-full border-2 border-cyan-400 overflow-hidden bg-slate-900">
                <img id="top-avatar" class="w-full h-full object-cover hidden">
            </div>
        </header>

        <main class="flex-1 px-6 pt-4 overflow-hidden relative">
            
            <!-- VIEW: IDENTITY ROLE -->
            <div id="view-roles" class="view-container view-active pt-6">
                <h2 class="text-center text-[10px] text-slate-500 font-black uppercase tracking-widest mb-8">Identify Node Access</h2>
                <div class="grid gap-3">
                    <button onclick="UIManager.openReg('Student')" class="glass p-5 rounded-2xl text-left border-l-4 border-cyan-500">Student</button>
                    <button onclick="UIManager.openReg('Lecturer')" class="glass p-5 rounded-2xl text-left border-l-4 border-indigo-500">Lecturer</button>
                    <button onclick="UIManager.openReg('HOD')" class="glass p-5 rounded-2xl text-left border-l-4 border-purple-500">HOD</button>
                    <button onclick="UIManager.openReg('LabAssistant')" class="glass p-5 rounded-2xl text-left border-l-4 border-orange-500">Lab Assistant</button>
                    <button onclick="UIManager.openReg('Alumni')" class="glass p-5 rounded-2xl text-left border-l-4 border-emerald-500">Alumni</button>
                </div>
            </div>

            <!-- VIEW: ENROLLMENT -->
            <div id="view-register" class="view-container">
                <div class="glass p-7 rounded-[2.5rem] text-center border-t-2 border-cyan-500">
                    <h2 id="reg-title" class="font-['Orbitron'] text-cyan-400 text-lg mb-6">ENROLL</h2>
                    <div class="video-box mb-6" style="width:120px; height:120px;"><video id="v-reg" autoplay muted playsinline></video></div>
                    <div class="space-y-4 text-left">
                        <input id="r-id" type="text" placeholder="Roll No / Staff ID">
                        <input id="r-name" type="text" placeholder="Full Name">
                        <input id="r-dept" placeholder="Department">
                        <button onclick="UIManager.completeRegistration()" class="cyber-btn mt-4">Bind Sovereign ID</button>
                    </div>
                </div>
                <p class="text-center text-[8px] text-slate-600 mt-6 uppercase">ID must be unique in Registry Sheets</p>
            </div>

            <!-- VIEW: DASHBOARD (HUB) -->
            <div id="view-dashboard" class="view-container space-y-6">
                <div class="flex items-center gap-4 bg-white/5 p-4 rounded-2xl border border-white/10">
                    <img id="dash-photo" class="w-12 h-12 rounded-full border-2 border-cyan-500 object-cover">
                    <div>
                        <h4 id="dash-name" class="font-black text-white text-sm uppercase">...</h4>
                        <p id="dash-role" class="text-[8px] text-slate-500 font-black uppercase tracking-widest"></p>
                    </div>
                </div>

                <!-- GROQ AI HUB -->
                <div class="glass p-5 rounded-[2rem]">
                    <div class="flex items-center gap-2 mb-3">
                        <div class="w-1.5 h-1.5 bg-cyan-400 rounded-full animate-pulse"></div>
                        <h4 class="text-[9px] font-black text-cyan-400 uppercase tracking-widest">Neural Oracle</h4>
                    </div>
                    <div class="flex gap-2">
                        <input id="ai-input" type="text" placeholder="Consulting Oracle..." class="!py-2 !text-xs !bg-black/40">
                        <button onclick="UIManager.askAI()" class="bg-cyan-500 text-black px-4 rounded-xl text-[10px] font-black uppercase">Ask</button>
                    </div>
                    <div id="ai-response" class="hidden p-3 mt-3 bg-indigo-500/10 border-l-2 border-cyan-400 text-[11px] italic text-slate-300 leading-relaxed"></div>
                </div>

                <div id="role-modules" class="space-y-4"></div>
            </div>

            <!-- VIEW: NEXUS -->
            <div id="view-nexus" class="view-container">
                <h3 class="font-['Orbitron'] text-indigo-400 text-xl italic uppercase mb-6 tracking-tighter">Nexus Directory</h3>
                <div id="nexus-list" class="grid gap-3"></div>
            </div>

            <!-- VIEW: FEED -->
            <div id="view-discuss" class="view-container">
                <h3 class="font-['Orbitron'] text-purple-400 text-xl italic uppercase mb-6 tracking-tighter">Global Feed</h3>
                <div id="feed-list" class="space-y-4"></div>
            </div>

            <!-- VIEW: LEAVE -->
            <div id="view-leave" class="view-container space-y-6">
                <h3 id="leave-header" class="font-['Orbitron'] text-red-400 text-xl italic uppercase mb-6 tracking-tighter">Leave Ledger</h3>
                <div id="leave-form" class="glass p-6 rounded-[2rem] border-t-4 border-red-500">
                    <p id="leave-instruction" class="text-[10px] text-slate-500 font-black uppercase mb-4 tracking-widest">Absence Record</p>
                    <textarea id="lv-reason" placeholder="State reason..." class="h-24 mb-4 !text-xs !bg-black/40"></textarea>
                    <button id="btn-leave-action" onclick="UIManager.submitLeave()" class="cyber-btn !bg-red-600 !text-white">Submit Entry</button>
                </div>
                <div id="leave-queue-container" class="hidden space-y-4">
                    <p class="text-[10px] text-yellow-500 font-black uppercase tracking-widest">Verification Queue</p>
                    <div id="leave-queue" class="space-y-3"></div>
                </div>
            </div>

        </main>

        <nav id="bottom-nav" class="bottom-nav hidden">
            <button onclick="UIManager.switchTab('dashboard')" id="btn-dashboard" class="nav-item nav-active"><i data-lucide="shield-check"></i><span>HUB</span></button>
            <button onclick="UIManager.switchTab('nexus')" id="btn-nexus" class="nav-item"><i data-lucide="users"></i><span>NEXUS</span></button>
            <button onclick="UIManager.switchTab('discuss')" id="btn-discuss" class="nav-item"><i data-lucide="message-square"></i><span>FEED</span></button>
            <button onclick="UIManager.switchTab('leave')" id="btn-leave" class="nav-item"><i data-lucide="calendar"></i><span>LEAVE</span></button>
        </nav>
    </div>

    <script>
        const BACKEND_URL = "https://script.google.com/macros/s/AKfycbx9KZfFxGH8V0XdZjNMeJHO08O3GNUxCXJe96Bi1RsPhUjZ9sl5HfX37fk8CcrNuVdg/exec";
        const COLLEGE_COORDS = { lat: 17.74069743725532, lng: 83.32125099999946 };
        
        let USER = JSON.parse(localStorage.getItem('csync_v8_user'));
        let currentRole = "";

        const UIManager = {
            init() {
                lucide.createIcons();
                if (USER) this.setupSession();
            },

            toggleSidebar() {
                document.getElementById('sidebar').classList.toggle('open');
            },

            switchTab(tab) {
                document.querySelectorAll('.view-container').forEach(v => v.classList.remove('view-active'));
                document.getElementById('view-' + tab).classList.add('view-active');
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('nav-active'));
                document.getElementById('btn-' + tab)?.classList.add('nav-active');
                
                if (tab === 'nexus') this.renderNexus();
                if (tab === 'discuss') this.renderFeed();
                if (tab === 'leave') this.setupLeaveView();
                
                document.getElementById('sidebar').classList.remove('open');
                lucide.createIcons();
            },

            openReg(role) {
                currentRole = role;
                document.getElementById('view-roles').classList.remove('view-active');
                document.getElementById('view-register').classList.add('view-active');
                document.getElementById('reg-title').innerText = role + " ENROLL";
                
                const idInp = document.getElementById('r-id');
                idInp.placeholder = (role === 'Student' || role === 'Alumni') ? "Roll Number" : "Staff ID";

                navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
                    .then(s => document.getElementById('v-reg').srcObject = s);
            },

            async completeRegistration() {
                const id = document.getElementById('r-id').value.trim().toUpperCase();
                const name = document.getElementById('r-name').value.trim();
                const dept = document.getElementById('r-dept').value.trim();
                if (!id || !name) return alert("All Nodes required.");

                // DUPLICATE CHECK: Local Prevention
                let localRegistry = JSON.parse(localStorage.getItem('csync_local_registry') || '[]');
                if (localRegistry.includes(id)) return alert("Duplicate Error: ID is already bound to this hub.");

                const canvas = document.createElement('canvas');
                const video = document.getElementById('v-reg');
                canvas.width = 150; canvas.height = 150;
                canvas.getContext('2d').drawImage(video, 0, 0, 150, 150);

                const regData = { action: 'register', id, name, role: currentRole, dept, photo: canvas.toDataURL('image/jpeg', 0.6) };

                // Post to Google Sheets
                try {
                    const res = await fetch(BACKEND_URL, { method: "POST", body: JSON.stringify(regData) });
                    const status = await res.text();
                    if (status === "ID_ALREADY_EXISTS") return alert("Global Identity Conflict: ID exists in Sheet Registry.");
                } catch(e) { console.warn("Background sync active."); }

                USER = regData;
                localRegistry.push(id);
                localStorage.setItem('csync_local_registry', JSON.stringify(localRegistry));
                localStorage.setItem('csync_v8_user', JSON.stringify(USER));
                
                let nexus = JSON.parse(localStorage.getItem('csync_nexus') || '[]');
                nexus.push(USER);
                localStorage.setItem('csync_nexus', JSON.stringify(nexus));

                location.reload();
            },

            setupSession() {
                document.getElementById('view-roles').classList.remove('view-active');
                document.getElementById('view-dashboard').classList.add('view-active');
                document.getElementById('bottom-nav').classList.remove('hidden');
                document.getElementById('top-avatar').classList.remove('hidden');
                document.getElementById('top-avatar').src = USER.photo;
                document.getElementById('dash-photo').src = USER.photo;
                document.getElementById('dash-name').innerText = USER.name;
                document.getElementById('dash-role').innerText = `${USER.role} • ${USER.dept}`;

                this.renderModules();
                lucide.createIcons();
            },

            renderModules() {
                const container = document.getElementById('role-modules');
                container.innerHTML = "";

                // LAB PC SCAN: Locked for Alumni
                if (USER.role !== 'Alumni') {
                    container.innerHTML += `
                        <div class="glass p-6 rounded-[2rem] text-center border-t-4 border-emerald-500">
                            <i data-lucide="qr-code" class="w-8 h-8 mx-auto mb-2 text-emerald-400"></i>
                            <p class="text-[10px] font-black uppercase text-slate-400 mb-6 tracking-widest">Lab PC Handshake</p>
                            <button onclick="UIManager.startScan()" class="cyber-btn">Secure Scan Station</button>
                            <div id="qr-box" class="mt-4 hidden rounded-2xl overflow-hidden"></div>
                        </div>
                    `;
                }

                if (USER.role === 'Student') {
                    container.innerHTML += `
                        <div class="glass p-6 rounded-[2rem] text-center border-t-4 border-indigo-500">
                            <i data-lucide="map-pin" class="w-8 h-8 mx-auto mb-2 text-indigo-400"></i>
                            <p class="text-[10px] font-black uppercase text-slate-400 mb-6 tracking-widest">Neural Presence Verify</p>
                            <button onclick="UIManager.markAttendance()" class="cyber-btn">Verify Face & GPS</button>
                        </div>
                    `;
                }
                
                if (USER.role === 'HOD' || USER.role === 'Lecturer') {
                    container.innerHTML += `
                        <div class="glass p-6 rounded-[2rem] border-t-4 border-purple-500">
                            <h5 class="text-[10px] font-black text-purple-500 uppercase mb-4 tracking-widest">Management Ledger</h5>
                            <div class="flex justify-between items-center bg-black/30 p-4 rounded-xl">
                                <span class="text-[10px] font-bold">Pending Approvals</span>
                                <span class="bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-full font-black" id="req-count">0</span>
                            </div>
                        </div>
                    `;
                    this.updateLeaveCount();
                }
                lucide.createIcons();
            },

            // GPS + FACE LOCK PROTOCOL
            async markAttendance() {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    
                    // Haversine Verifier
                    const p = 0.01745329; const c = Math.cos;
                    const a = 0.5 - c((COLLEGE_COORDS.lat - lat) * p)/2 + c(lat * p) * c(COLLEGE_COORDS.lat * p) * (1 - c((COLLEGE_COORDS.lng - lng) * p))/2;
                    const dist = 12742 * Math.asin(Math.sqrt(a));

                    if (dist > 0.4) return alert(`ACCESS DENIED: GPS pulse detected outside campus radius (${(dist*1000).toFixed(0)}m away).`);

                    const gate = document.getElementById('face-gate');
                    gate.style.display = 'flex';
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    document.getElementById('auth-video').srcObject = stream;

                    // Capture Frame after 3s scan simulation
                    setTimeout(async () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = 150; canvas.height = 150;
                        canvas.getContext('2d').drawImage(document.getElementById('auth-video'), 0,0, 150, 150);
                        const biometricPhoto = canvas.toDataURL('image/jpeg', 0.6);
                        
                        stream.getTracks().forEach(t => t.stop());
                        gate.style.display = 'none';

                        const data = { action: 'attendance', id: USER.id, name: USER.name, role: USER.role, coords: `${lat},${lng}`, photo: biometricPhoto };
                        await fetch(BACKEND_URL, { method: 'POST', body: JSON.stringify(data) });
                        alert("SOVEREIGN PRESENCE VERIFIED: Logged to Sheet Attendance.");
                    }, 3000);

                }, () => alert("GPS ERROR: Satellite handshake failed."));
            },

            startScan() {
                const box = document.getElementById('qr-box');
                box.classList.remove('hidden');
                const scanner = new Html5Qrcode("qr-box");
                scanner.start({ facingMode: "environment" }, { fps: 15, qrbox: 200 }, (decoded) => {
                    alert("PC SECURED: " + decoded);
                    fetch(BACKEND_URL, { method: "POST", body: JSON.stringify({ action: "lab_session", id: USER.id, pcId: decoded })});
                    scanner.stop(); box.classList.add('hidden');
                });
            },

            setupLeaveView() {
                const h1 = document.getElementById('leave-header');
                const instr = document.getElementById('leave-instruction');
                const btn = document.getElementById('btn-leave-action');
                
                if (USER.role === 'HOD') {
                    h1.innerText = "HOD INTIMATION";
                    h1.className = "font-['Orbitron'] text-emerald-400 text-xl uppercase italic mb-6 tracking-tighter";
                    instr.innerText = "Broadcast Intimation Notice";
                    btn.innerText = "Sovereign Hub Broadcast";
                } else {
                    h1.innerText = "LEAVE LEDGER";
                    instr.innerText = "Request Absence Record";
                    btn.innerText = "Submit to HOD";
                }
                if (USER.role === 'HOD' || USER.role === 'Lecturer') this.renderLeaveQueue();
            },

            async submitLeave() {
                const reason = document.getElementById('lv-reason').value.trim();
                if (!reason) return;

                if (USER.role === 'HOD') {
                    let feed = JSON.parse(localStorage.getItem('csync_feed') || '[]');
                    feed.unshift({ 
                        name: "HOD PRIORITY NOTICE", 
                        role: "Admin Broadcast", 
                        text: `OFFICIAL INTIMATION: ${reason}. This notice is visible to all Staff and Student nodes.`, 
                        time: new Date().toLocaleTimeString(), 
                        isHoD: true 
                    });
                    localStorage.setItem('csync_feed', JSON.stringify(feed));
                    alert("HoD Intimation broadcasted to feed.");
                } else {
                    let leaves = JSON.parse(localStorage.getItem('csync_leaves') || '[]');
                    leaves.push({ id: Date.now(), user: USER.name, role: USER.role, reason, status: 'Pending' });
                    localStorage.setItem('csync_leaves', JSON.stringify(leaves));
                    alert("Absence request dispatched.");
                }
                
                fetch(BACKEND_URL, { method: "POST", body: JSON.stringify({ action: "leave", id: USER.id, name: USER.name, role: USER.role, reason: reason }) });
                document.getElementById('lv-reason').value = "";
                this.renderFeed();
            },

            renderLeaveQueue() {
                document.getElementById('leave-queue-container').classList.remove('hidden');
                const leaves = JSON.parse(localStorage.getItem('csync_leaves') || '[]');
                const queue = document.getElementById('leave-queue');
                queue.innerHTML = leaves.filter(l => l.status === 'Pending').map(l => `
                    <div class="glass p-4 rounded-2xl border-l-4 border-yellow-500">
                        <h5 class="text-[10px] font-black uppercase mb-1">${l.user} [${l.role}]</h5>
                        <p class="text-[10px] text-slate-400 italic mb-3">"${l.reason}"</p>
                        <button onclick="UIManager.updateLeave(${l.id}, 'Approved')" class="bg-emerald-600 text-[8px] px-3 py-1.5 rounded-lg font-black uppercase">Approve</button>
                    </div>
                `).join('') || '<p class="text-[8px] text-slate-500 uppercase">Registry clear.</p>';
            },

            updateLeave(id, status) {
                let leaves = JSON.parse(localStorage.getItem('csync_leaves') || '[]');
                leaves = leaves.map(l => l.id === id ? { ...l, status } : l);
                localStorage.setItem('csync_leaves', JSON.stringify(leaves));
                this.renderLeaveQueue();
                this.updateLeaveCount();
            },

            updateLeaveCount() {
                const leaves = JSON.parse(localStorage.getItem('csync_leaves') || '[]');
                const count = leaves.filter(l => l.status === 'Pending').length;
                const el = document.getElementById('req-count');
                if (el) el.innerText = count;
            },

            renderNexus() {
                const nexus = JSON.parse(localStorage.getItem('csync_nexus') || '[]');
                document.getElementById('nexus-list').innerHTML = nexus.map(n => `
                    <div class="glass p-4 rounded-2xl flex items-center gap-4">
                        <img src="${n.photo}" class="w-10 h-10 rounded-full border border-white/5 object-cover">
                        <div><h5 class="text-[11px] font-black uppercase">${n.name}</h5><p class="text-[8px] text-slate-500 uppercase">${n.role}</p></div>
                    </div>
                `).join('') || '<p class="text-center text-[10px] text-slate-500 uppercase mt-20">No Peer Nodes.</p>';
            },

            renderFeed() {
                const feed = JSON.parse(localStorage.getItem('csync_feed') || '[]');
                const filtered = USER.role === 'Alumni' ? feed.filter(f => !f.isHoD) : feed;
                document.getElementById('feed-list').innerHTML = filtered.map(f => `
                    <div class="glass p-5 rounded-2xl ${f.isHoD ? 'border-l-4 border-red-500' : ''}">
                        <h5 class="text-[10px] font-black ${f.isHoD ? 'text-red-500' : 'text-cyan-400'} uppercase">${f.name}</h5>
                        <p class="text-xs text-slate-300 mt-2 leading-relaxed">${f.text}</p>
                        <p class="text-[7px] text-slate-600 mt-4 uppercase">${f.time}</p>
                    </div>
                `).join('') || '<p class="text-center text-[10px] text-slate-500 uppercase mt-20">Hub Feed Silent...</p>';
            },

            async askAI() {
                const query = document.getElementById('ai-input').value;
                const respBox = document.getElementById('ai-response');
                if (!query) return;
                respBox.classList.remove('hidden');
                respBox.innerText = "Consulting Groq Cloud...";
                
                try {
                    const finalUrl = `${BACKEND_URL}?action=groq&query=${encodeURIComponent(query)}&user=${encodeURIComponent(USER.name)}&role=${encodeURIComponent(USER.role)}`;
                    const res = await fetch(finalUrl, { method: "GET" });
                    respBox.innerText = await res.text();
                } catch (e) { respBox.innerText = "Sync failure with Sovereign Backend."; }
            },

            logout() { 
                if (confirm("DANGER: Wiping ID unbinds device. Proceed?")) { 
                    localStorage.removeItem('csync_v8_user'); 
                    location.reload(); 
                } 
            }
        };

        window.onload = () => UIManager.init();
    </script>
</body>
</html>
