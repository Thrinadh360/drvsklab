<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C-Sync | Station Terminal OS</title>
    
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

    <style>
        :root { --accent: #00f2ff; --bg: #000; }
        body { background: var(--bg); color: white; margin: 0; overflow: hidden; font-family: sans-serif; cursor: none; }
        
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(50px); border: 1px solid rgba(255,255,255,0.1); border-radius: 2.5rem; }
        
        /* Reinforced Binding Interface */
        #view-setup { 
            position: fixed; 
            inset: 0; 
            background: radial-gradient(circle, #020617 0%, #000 100%); 
            z-index: 99999; 
            display: none; /* Controlled by JS */
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            cursor: auto !important; /* Ensure cursor shows here */
            pointer-events: all !important;
        }

        #setup-id-select { 
            background: #0f172a !important; 
            border: 2px solid var(--accent) !important; 
            color: white !important; 
            padding: 20px !important; 
            border-radius: 15px !important; 
            font-size: 24px !important; 
            font-family: 'Orbitron'; 
            width: 350px; 
            text-align: center; 
            cursor: pointer !important; 
            outline: none; 
            box-shadow: 0 0 30px rgba(0,242,255,0.1);
            appearance: none; /* Removes default browser styling */
        }

        /* HUD Intercom */
        #whisper-hud { position: fixed; top: 10%; left: 50%; transform: translateX(-50%); width: 60%; z-index: 10000; display: none; animation: slideDown 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        @keyframes slideDown { from { transform: translate(-50%, -150%); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }

        /* Security QR */
        .qr-box { position: relative; padding: 25px; background: white; border-radius: 30px; box-shadow: 0 0 60px rgba(0,242,255,0.2); }
        .scan-line { position: absolute; top: 0; left: 0; width: 100%; height: 5px; background: var(--accent); animation: scan 2.5s infinite linear; z-index: 10; box-shadow: 0 0 15px var(--accent); }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        .pc-id-watermark { font-family: 'Orbitron', sans-serif; letter-spacing: -8px; user-select: none; pointer-events: none; }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- 1. HARDWARE BINDING GATE (FIRST RUN) -->
    <div id="view-setup">
        <div class="text-center">
            <div class="w-20 h-20 bg-cyan-400/10 rounded-full flex items-center justify-center mx-auto mb-8 border border-cyan-400/30">
                <i data-lucide="cpu" class="text-cyan-400 w-10 h-10 animate-pulse"></i>
            </div>
            <h1 class="font-['Orbitron'] text-white text-5xl mb-3 font-black italic tracking-tighter">HARDWARE BINDING</h1>
            <p class="text-slate-500 font-bold uppercase tracking-[0.5em] mb-12 text-[11px]">Laboratory Setup // Computer Science Dept</p>
            
            <div class="relative inline-block">
                <select id="setup-id-select">
                    <option value="" disabled selected>SELECT STATION</option>
                    <!-- Generated dynamically -->
                </select>
                <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none">
                    <i data-lucide="chevron-down" class="text-cyan-400"></i>
                </div>
            </div>

            <button onclick="Kiosk.bindHardware()" class="mt-12 block mx-auto bg-cyan-400 text-black font-black font-['Orbitron'] px-16 py-5 rounded-2xl hover:bg-white hover:scale-105 transition-all shadow-xl shadow-cyan-400/20">INITIALIZE BINDING</button>
        </div>
    </div>

    <!-- 2. NEURAL WHISPER HUD (ADMIN OVERLAY) -->
    <div id="whisper-hud" class="glass p-12 border-l-[15px] border-cyan-400 shadow-2xl">
        <div class="flex items-center gap-10">
            <i data-lucide="zap" class="w-16 h-16 text-cyan-400 animate-bounce"></i>
            <div>
                <p class="text-cyan-400 text-[11px] font-black uppercase tracking-[0.5em] mb-3">Neural Whisper // Admin Command</p>
                <h1 id="whisper-txt" class="text-5xl font-['Orbitron'] font-black italic uppercase text-white leading-tight"></h1>
            </div>
        </div>
    </div>

    <!-- 3. LOCKED STATE -->
    <div id="view-lock" class="h-screen flex flex-col items-center justify-center bg-[radial-gradient(circle_at_center,_#0a192f_0%,_#000_100%)]">
        <h1 id="station-id-display" class="pc-id-watermark text-[18rem] font-black text-white/5 absolute top-5">...</h1>
        <div class="z-10 text-center">
            <div class="qr-box inline-block mb-12">
                <div class="scan-line"></div>
                <div id="qr-container"></div>
            </div>
            <h2 class="text-3xl font-['Orbitron'] font-black text-cyan-400 mb-3 uppercase italic tracking-widest">Station Locked</h2>
            <p class="text-slate-500 font-bold uppercase tracking-[0.4em] text-[11px]">Synchronize with Authorized Mobile Node</p>
        </div>
    </div>

    <!-- 4. ACTIVE SESSION -->
    <div id="view-active" class="hidden h-screen flex flex-col items-center justify-center bg-[#000]">
        <div class="glass p-20 flex items-center gap-16 border-l-[15px] border-emerald-500 max-w-6xl shadow-[0_0_120px_rgba(16,185,129,0.15)]">
            <img id="u-photo" src="" class="w-64 h-64 rounded-full border-4 border-emerald-500/50 object-cover">
            <div>
                <p class="text-emerald-500 font-['Orbitron'] font-black text-[16px] mb-6 tracking-[0.6em]">SESSION AUTHORIZED</p>
                <h1 id="u-name" class="text-[6rem] font-['Orbitron'] font-black uppercase italic mb-8 leading-none">...</h1>
                <div class="flex items-center gap-8 text-slate-500 font-black text-lg uppercase tracking-widest">
                    <span id="session-time" class="text-white bg-white/5 px-6 py-2 rounded-xl">00:00:00</span>
                    <span class="text-slate-800">/</span>
                    <span id="pc-id-active" class="text-cyan-400">...</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // MASTER CONFIGURATION
        const API = "https://script.google.com/macros/s/AKfycbySW9SpdS5gJQ86RVbkjmFD4Y7kOe0BQW1X86escKtDcDtBLaaU9v_VEmvBnodNcRp8eg/exec";
        let PC_ID = localStorage.getItem('csync_station_binding');
        let IS_OCCUPIED = false;

        const Kiosk = {
            init() {
                lucide.createIcons();
                
                if (!PC_ID) {
                    this.showSetup();
                    return;
                }

                document.getElementById('station-id-display').innerText = PC_ID;
                document.getElementById('pc-id-active').innerText = PC_ID;
                this.rotateQR();
                this.poll();
                
                setInterval(() => this.rotateQR(), 10000);
                setInterval(() => this.cctvPulse(), 8000);
            },

            showSetup() {
                const setupView = document.getElementById('view-setup');
                const select = document.getElementById('setup-id-select');
                
                setupView.style.display = 'flex'; // Explicit display
                document.body.style.cursor = 'auto'; // Explicit cursor

                // Clear existing options except first
                select.innerHTML = '<option value="" disabled selected>SELECT STATION</option>';

                for (let i = 1; i <= 50; i++) {
                    let id = `CS-${i.toString().padStart(2, '0')}`;
                    let opt = document.createElement('option');
                    opt.value = id;
                    opt.innerText = id;
                    select.appendChild(opt);
                }
                lucide.createIcons();
            },

            bindHardware() {
                const select = document.getElementById('setup-id-select');
                const selected = select.value;
                if (!selected) return alert("Please select a valid Station ID.");
                
                if (confirm(`Finalize: Bind this hardware as ${selected}?`)) {
                    localStorage.setItem('csync_station_binding', selected);
                    location.reload();
                }
            },

            async rotateQR() {
                if (IS_OCCUPIED) return;
                try {
                    const res = await fetch(`${API}?action=get_kiosk_token&sysId=${PC_ID}`);
                    const token = await res.text();
                    const qrContainer = document.getElementById('qr-container');
                    qrContainer.innerHTML = "";
                    new QRCode(qrContainer, {
                        text: JSON.stringify({ id: PC_ID, auth: token }),
                        width: 320, height: 320,
                        colorDark: "#000", colorLight: "#fff",
                        correctLevel: QRCode.CorrectLevel.H
                    });
                } catch (e) {}
            },

            async poll() {
                try {
                    const res = await fetch(`${API}?action=kiosk_poll&sysId=${PC_ID}`);
                    const data = await res.json();
                    if (data.whisper) this.showWhisper(data.whisper);
                    if (data.status === "AUTHORIZED" && !IS_OCCUPIED) this.unlock(data);
                    else if (data.status === "IDLE" && IS_OCCUPIED) location.reload();
                } catch (e) {}
                setTimeout(() => this.poll(), 4000);
            },

            async cctvPulse() {
                if (!IS_OCCUPIED) return;
                try {
                    const canvas = await html2canvas(document.body, { scale: 0.12, logging: false });
                    fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'push_frame', pcId: PC_ID, frame: canvas.toDataURL('image/jpeg', 0.1) }) });
                } catch (e) {}
            },

            unlock(u) {
                IS_OCCUPIED = true;
                document.getElementById('view-lock').style.display = 'none';
                document.getElementById('view-active').style.display = 'flex';
                document.getElementById('u-photo').src = u.profilePic;
                document.getElementById('u-name').innerText = u.name;
                this.speak(`Handshake successful. Welcome ${u.name}. Station ${PC_ID} ready.`);
                this.startTimer();
            },

            showWhisper(msg) {
                const hud = document.getElementById('whisper-hud');
                document.getElementById('whisper-txt').innerText = msg;
                hud.style.display = 'block';
                this.speak(`Message: ${msg}`);
                setTimeout(() => hud.style.display = 'none', 12000);
            },

            speak(txt) {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(txt.replace(/\bDr\./g, 'Doctor'));
                msg.rate = 0.9; window.speechSynthesis.speak(msg);
            },

            startTimer() {
                let s = 0;
                setInterval(() => {
                    s++;
                    let h = Math.floor(s/3600).toString().padStart(2,'0');
                    let m = Math.floor((s%3600)/60).toString().padStart(2,'0');
                    let sc = (s%60).toString().padStart(2,'0');
                    document.getElementById('session-time').innerText = `${h}:${m}:${sc}`;
                }, 1000);
            }
        };

        window.onload = () => Kiosk.init();
    </script>
</body>
</html>
