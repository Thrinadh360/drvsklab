<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Workstation | CS Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        #qrcode img { border: 12px solid white; border-radius: 20px; margin: 0 auto; box-shadow: 0 0 50px rgba(79, 70, 229, 0.3); }
        .welcome-anim { animation: zoomIn 0.5s ease-out; }
        @keyframes zoomIn { from { opacity: 0; scale: 0.9; } to { opacity: 1; scale: 1; } }
    </style>
</head>
<body class="h-screen flex items-center justify-center">

    <div id="lock-screen" class="text-center space-y-12">
        <header>
            <p class="text-indigo-400 font-bold uppercase tracking-[0.6em] text-xs mb-3">Dr. V.S. Krishna Govt. Degree College (Autonomous)</p>
            <h1 style="font-family: 'Orbitron', sans-serif;" class="text-6xl font-black tracking-tighter">CS CONNECT</h1>
        </header>

        <div class="glass p-16 rounded-[4rem] shadow-2xl border-t-8 border-indigo-600 inline-block">
            <h2 id="sys-id" class="text-8xl font-black mb-4 tracking-tighter">CS-XX</h2>
            <p class="text-slate-500 font-bold uppercase text-xs tracking-widest mb-10">Scan with Mobile App to Unlock</p>
            <div id="qrcode"></div>
        </div>

        <div class="text-2xl font-light text-slate-500 font-mono" id="clock">00:00:00 AM</div>
    </div>

    <div id="welcome-screen" class="hidden text-center welcome-anim">
        <div class="w-32 h-32 bg-indigo-600 rounded-full flex items-center justify-center mx-auto mb-8 shadow-2xl">
            <i data-lucide="user" class="w-16 h-16"></i>
        </div>
        <h1 class="text-7xl font-black uppercase italic tracking-tighter">Welcome</h1>
        <h2 id="user-name" class="text-3xl font-bold text-indigo-400 uppercase mt-4 italic">STUDENT</h2>
        <p class="mt-12 text-slate-500 font-black uppercase text-xs tracking-[0.5em] animate-pulse">Launching Desktop...</p>
    </div>

    <footer class="fixed bottom-10 w-full text-center text-[10px] font-bold text-slate-700 uppercase tracking-widest">
        Copyright © 2026 | Dept of Computer Science | Dr. V. S. Krishna GDC (A) | Dev: M.Thrinadh
    </footer>

    <script>
        const BACKEND = "https://script.google.com/macros/s/AKfycbzuCEHK3h92DIpPwB89dxQdXnfkGyRTm2oOpT-5p2503vsLylptMdzCJfwpXk6Z7O2U/exec";
        const params = new URLSearchParams(window.location.search);
        const SystemID = params.get('sysId') || "CS-01";
        const MAC = params.get('mac') || "NONE";

        document.getElementById('sys-id').innerText = SystemID;

        function generateQR() {
            new QRCode(document.getElementById("qrcode"), {
                text: `${window.location.origin}${window.location.pathname}?sysId=${SystemID}&mac=${MAC}`,
                width: 250, height: 250
            });
        }

        async function pollHandshake() {
            const res = await fetch(`${BACKEND}?action=lab`);
            const data = await res.json();
            const myPC = data.find(p => p.SystemID === SystemID);
            if (myPC && myPC.Command === "UNLOCK") {
                document.getElementById('lock-screen').classList.add('hidden');
                document.getElementById('welcome-screen').classList.remove('hidden');
                document.getElementById('user-name').innerText = myPC.Status; // Backend writes name here
                lucide.createIcons();
            }
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
        setInterval(pollHandshake, 2000);
        window.onload = () => { generateQR(); lucide.createIcons(); };
    </script>
</body>
</html>
