<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CSYNC | Sovereign Personal Node</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

    <style>
        :root { --accent: #00f2ff; --bg: #000000; --card: rgba(15, 23, 42, 0.6); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: white; margin: 0; height: 100dvh; overflow: hidden; user-select: none; }
        
        .glass { background: var(--card); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.05); }
        .cyber-btn { background: var(--accent); color: black; font-weight: 800; border-radius: 14px; padding: 12px; transition: 0.2s; text-transform: uppercase; font-size: 10px; width: 100%; border: none; cursor: pointer; }
        .cyber-btn:active { transform: scale(0.96); }

        .view-container { display: none; height: 100%; overflow-y: auto; padding-bottom: 220px; scroll-behavior: smooth; }
        .view-active { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .face-gate { position: fixed; inset: 0; background: black; z-index: 9000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .video-box { width: 220px; height: 220px; border-radius: 50%; border: 3px solid var(--accent); overflow: hidden; margin-bottom: 20px; background: #000; position: relative; }
        .video-box::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: var(--accent); animation: scan 2s infinite linear; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        
        input, select, textarea { background: #0f172a !important; border: 1px solid #1e293b !important; color: white !important; padding: 12px !important; border-radius: 12px !important; width: 100%; font-size: 14px; }
        .bottom-nav { position: fixed; bottom: 30px; left: 20px; right: 20px; height: 75px; border-radius: 25px; display: flex; justify-content: space-around; align-items: center; z-index: 1000; background: rgba(10,11,30,0.95); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px); }
        .nav-item { color: #475569; display: flex; flex-direction: column; align-items: center; font-size: 9px; font-weight: 800; background: none; border: none; }
        .nav-active { color: var(--accent); filter: drop-shadow(0 0 5px var(--accent)); }
        
        .tech-footer { position: fixed; bottom: 0; width: 100%; padding: 10px; background: #000; border-top: 1px solid #111; text-align: center; font-size: 7px; color: #444; z-index: 5000; }
        .close-reg { position: absolute; top: 20px; right: 20px; color: #475569; cursor: pointer; transition: 0.2s; }
        .close-reg:hover { color: var(--accent); }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- STEALTH PERIMETER -->
    <script>
        document.onkeydown = e => { if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) return false; };
        setInterval(() => { (function(){}.constructor("debugger")()) }, 50);
    </script>

    <!-- BIOMETRIC AUTH OVERLAY -->
    <div id="face-gate" class="face-gate">
        <div class="video-box"><video id="auth-video" autoplay muted playsinline class="w-full h-full object-cover"></video></div>
        <h2 class="font-['Orbitron'] text-cyan-400 text-lg animate-pulse uppercase">Neural Link</h2>
        <p class="text-[9px] text-slate-500 mt-2 uppercase tracking-widest font-black">Syncing Biometrics & GPS Pulse</p>
    </div>

    <!-- SIDEBAR -->
    <div id="sidebar" style="position:fixed; inset:0; right:auto; width:280px; background:#05060f; z-index:5000; transform:translateX(-100%); transition:0.4s; border-right:1px solid #1e293b;" class="p-8 flex flex-col shadow-2xl">
        <div class="flex justify-between items-center mb-10">
            <h1 class="font-['Orbitron'] text-xl text-cyan-400 uppercase italic">CSYNC</h1>
            <button onclick="UI.toggleSidebar()"><i data-lucide="x" class="text-slate-500"></i></button>
        </div>
        <nav class="space-y-6 flex-1">
            <button onclick="UI.switchTab('dashboard')" class="flex items-center gap-4 text-xs font-bold uppercase"><i data-lucide="layout-dashboard" class="w-4 h-4"></i> Hub</button>
            <button id="side-search" onclick="UI.switchTab('search')" class="hidden flex items-center gap-4 text-xs font-bold uppercase"><i data-lucide="search" class="w-4 h-4"></i> Search Nexus</button>
            <button id="side-rank" onclick="UI.switchTab('rankings')" class="hidden flex items-center gap-4 text-xs font-bold uppercase"><i data-lucide="trophy" class="w-4 h-4"></i> Valhalla</button>
        </nav>
        <button onclick="UI.logout()" class="text-red-500 font-bold text-[10px] mt-10 uppercase flex items-center gap-2"><i data-lucide="log-out" class="w-3 h-3"></i> Unbind Node</button>
    </div>

    <div class="flex flex-col h-full">
        <!-- HEADER -->
        <header class="flex justify-between items-center px-6 py-5 border-b border-white/5 bg-[#000000] z-[1002]">
            <div id="h-left">
                <button id="btn-menu" onclick="UI.toggleSidebar()"><i data-lucide="menu" class="text-cyan-400"></i></button>
                <button id="btn-back" class="hidden" onclick="UI.switchTab('dashboard')"><i data-lucide="arrow-left" class="text-cyan-400"></i></button>
            </div>
            <h1 class="font-['Orbitron'] text-lg font-black italic tracking-tighter">CSYNC</h1>
            <div id="u-node-box" class="hidden">
                <img id="u-photo" class="w-9 h-9 rounded-full border-2 border-cyan-400 object-cover" onclick="UI.switchTab('dashboard')">
            </div>
        </header>

        <main class="flex-1 px-6 pt-4 overflow-hidden relative">
            
            <!-- VIEW: ROLE SELECTION -->
            <div id="view-roles" class="view-container view-active pt-6">
                <h2 class="text-center text-[10px] text-slate-500 font-bold uppercase mb-8 tracking-widest">Identify Sovereign Node</h2>
                <div class="grid gap-3" id="role-grid">
                    <button onclick="UI.openReg('Student')" class="glass p-5 rounded-2xl text-left border-l-4 border-cyan-500 font-bold uppercase text-[10px]">Student (Major)</button>
                    <button onclick="UI.openReg('Minor')" class="glass p-5 rounded-2xl text-left border-l-4 border-emerald-500 font-bold uppercase text-[10px]">Minor Student</button>
                    <button onclick="UI.openReg('Guest')" class="glass p-5 rounded-2xl text-left border-l-4 border-slate-500 font-bold uppercase text-[10px]">Guest Node</button>
                    <div class="border-t border-white/5 my-2"></div>
                    <button onclick="UI.openReg('Lecturer')" class="glass p-5 rounded-2xl text-left border-l-4 border-indigo-500 font-bold uppercase text-[10px]">Lecturer</button>
                    <button onclick="UI.openReg('Lab Assistant')" class="glass p-5 rounded-2xl text-left border-l-4 border-orange-500 font-bold uppercase text-[10px]">Lab Assistant</button>
                    <button id="btn-hod-reg" onclick="UI.openReg('HOD')" class="glass p-5 rounded-2xl text-left border-l-4 border-purple-500 font-bold uppercase text-[10px]">HOD</button>
                    <button onclick="UI.openReg('Alumni')" class="glass p-5 rounded-2xl text-left border-l-4 border-slate-700 font-bold uppercase text-[10px]">Alumni</button>
                </div>
            </div>

            <!-- VIEW: REGISTRATION -->
            <div id="view-register" class="view-container relative">
                <div class="close-reg" onclick="UI.switchView('view-roles')"><i data-lucide="x-circle"></i></div>
                <div class="glass p-8 rounded-[2.5rem] text-center border-t-2 border-cyan-400">
                    <h2 id="reg-title" class="font-['Orbitron'] text-cyan-400 text-lg mb-6 uppercase tracking-widest">Enroll</h2>
                    
                    <div class="flex justify-center gap-4 mb-8">
                        <div class="text-center">
                            <p class="text-[7px] text-cyan-400 font-black mb-2 uppercase">Face Key</p>
                            <div class="w-20 h-20 rounded-full border-2 border-cyan-400 overflow-hidden bg-black" onclick="UI.captureFaceKey()">
                                <video id="v-reg-cam" autoplay muted playsinline class="w-full h-full object-cover"></video>
                                <img id="face-captured" class="hidden w-full h-full object-cover">
                            </div>
                        </div>
                        <div class="text-center">
                            <p class="text-[7px] text-slate-500 font-black mb-2 uppercase">Profile Pic</p>
                            <div class="w-20 h-20 rounded-xl border border-dashed border-slate-700 flex items-center justify-center overflow-hidden" onclick="document.getElementById('f-upload').click()">
                                <img id="profile-preview" class="hidden w-full h-full object-cover">
                                <i data-lucide="upload" id="up-ico" class="w-5 h-5 text-slate-700"></i>
                            </div>
                        </div>
                    </div>
                    <input type="file" id="f-upload" class="hidden" accept="image/*" onchange="UI.previewProfile(this)">

                    <div class="space-y-3">
                        <input id="r-id" placeholder="Roll No / Staff ID">
                        <input id="r-name" placeholder="Full Name">
                        
                        <!-- DYNAMIC DEPT / ORG FIELD -->
                        <div id="dept-container"></div>
                        
                        <select id="r-year" class="hidden"><option value="1">1st Year</option><option value="2">2nd Year</option><option value="3">3rd Year</option><option value="4">4th Year</option></select>
                        <button onclick="UI.register()" class="cyber-btn mt-6">Bind Sovereign Identity</button>
                    </div>
                </div>
            </div>

            <!-- VIEW: DASHBOARD -->
            <div id="view-dashboard" class="view-container space-y-6">
                <!-- Status Bento -->
                <div class="glass p-5 rounded-[2rem] flex items-center justify-between border-l-4 border-cyan-400">
                    <div class="flex items-center gap-4">
                        <div class="relative">
                            <img id="d-avatar" class="w-16 h-16 rounded-full border-2 border-white/10 object-cover">
                            <label class="absolute inset-0 flex items-center justify-center bg-black/40 rounded-full opacity-0 hover:opacity-100 cursor-pointer transition">
                                <i data-lucide="camera" class="w-4 h-4"></i>
                                <input type="file" class="hidden" onchange="UI.updateLivePhoto(this)">
                            </label>
                        </div>
                        <div>
                            <h4 id="d-greet" class="text-[9px] text-slate-500 font-black uppercase tracking-widest">Good Morning</h4>
                            <h4 id="d-name" class="font-black text-sm uppercase">Candidate</h4>
                            <p id="d-meta" class="text-[8px] text-slate-400 font-bold uppercase"></p>
                        </div>
                    </div>
                    <div class="text-right space-y-1">
                        <div id="d-streak" class="text-orange-500 font-black text-xs">🔥 0</div>
                        <div id="d-stars" class="text-[9px] text-yellow-500 font-black">⭐ 0</div>
                    </div>
                </div>

                <div id="module-stack" class="space-y-4"></div>

                <!-- INTEGRATED GROQ AI -->
                <div id="ai-mod" class="glass p-5 rounded-[2.5rem]">
                    <div class="flex items-center gap-2 mb-4">
                        <div class="w-1.5 h-1.5 bg-cyan-400 rounded-full animate-ping"></div>
                        <h4 class="text-[9px] font-black text-cyan-400 uppercase">Sovereign Neural Cloud</h4>
                    </div>
                    <div class="flex gap-2">
                        <input id="ai-q" placeholder="The system is part of my neural web. Ask..." class="!py-2 !text-xs !bg-black/50">
                        <button onclick="UI.askAI()" class="bg-cyan-500 text-black px-4 rounded-xl text-[10px] font-black uppercase">Sync</button>
                    </div>
                    <div id="ai-res" class="hidden p-3 mt-3 bg-white/5 border-l-2 border-cyan-400 text-[10px] italic leading-relaxed text-slate-300"></div>
                </div>
            </div>

            <!-- SEARCH -->
            <div id="view-search" class="view-container">
                <h3 class="font-['Orbitron'] text-cyan-400 text-xl italic mb-6">Nexus Search</h3>
                <div class="relative mb-6">
                    <input type="text" id="nexus-q" placeholder="Roll No or Name..." onkeyup="UI.nexusSearch()" class="pl-12">
                    <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 w-4 h-4"></i>
                </div>
                <div id="search-results" class="space-y-3"></div>
            </div>

        </main>

        <nav id="bottom-nav" class="bottom-nav hidden">
            <button onclick="UI.switchTab('dashboard')" id="nav-dashboard" class="nav-item nav-active"><i data-lucide="shield-check"></i><span class="mt-1">HUB</span></button>
            <button onclick="UI.switchTab('rankings')" id="nav-rankings" class="nav-item"><i data-lucide="trophy"></i><span class="mt-1">RANK</span></button>
            <button onclick="UI.switchTab('search')" id="nav-search" class="nav-item"><i data-lucide="search"></i><span class="mt-1">NEXUS</span></button>
            <button onclick="UI.switchTab('discuss')" id="nav-discuss" class="nav-item"><i data-lucide="message-square"></i><span class="mt-1">FEED</span></button>
        </nav>

        <footer class="tech-footer">
            &copy; <span id="cur-year"></span> | Developer: M. Thrinadh | Dept. of CS | Dr. VSK GDC (A). <span class="text-cyan-400">CORE SYSTEM</span>
        </footer>
    </div>

    <script>
        const APPS_URL = "https://script.google.com/macros/s/AKfycbx9KZfFxGH8V0XdZjNMeJHO08O3GNUxCXJe96Bi1RsPhUjZ9sl5HfX37fk8CcrNuVdg/exec";
        const UUID = btoa(navigator.userAgent + screen.width);
        let USER = JSON.parse(localStorage.getItem('csync_v31_user'));
        let faceData = "", profileData = "";

        const UI = {
            async init() {
                lucide.createIcons();
                document.getElementById('cur-year').innerText = new Date().getFullYear();
                if(USER) {
                    const status = await (await fetch(`${APPS_URL}?action=check_status&uid=${USER.id}&uuid=${UUID}`)).text();
                    if(status === "Pending") alert("Identity Verification Required by Faculty.");
                    else this.boot();
                } else {
                    this.checkHOD();
                }
            },

            async checkHOD() {
                const res = await fetch(`${APPS_URL}?action=check_hod`);
                if(await res.text() === "EXISTS") document.getElementById('btn-hod-reg')?.remove();
            },

            boot() {
                this.switchView('view-dashboard');
                document.getElementById('bottom-nav').classList.remove('hidden');
                document.getElementById('u-node-box').classList.remove('hidden');
                document.getElementById('u-photo').src = USER.photo;
                document.getElementById('d-avatar').src = USER.photo;
                document.getElementById('d-name').innerText = USER.name;
                document.getElementById('d-meta').innerText = `${USER.role} • ${USER.dept}`;
                
                // Neural Greeting
                const hour = new Date().getHours();
                const greet = hour < 12 ? "Good Morning" : hour < 17 ? "Good Afternoon" : "Good Evening";
                document.getElementById('d-greet').innerText = greet;

                if(USER.role === 'Guest') { document.getElementById('ai-mod').remove(); document.getElementById('nav-search').remove(); document.getElementById('nav-rankings').remove(); }
                this.renderModules();
            },

            renderModules() {
                const c = document.getElementById('module-stack');
                c.innerHTML = "";
                if(USER.role !== 'Alumni') c.innerHTML += `<div class="glass p-8 rounded-[2rem] text-center border-t-4 border-emerald-500"><button onclick="UI.openScanner('lab')" class="cyber-btn">Secure PC Handshake</button></div>`;
                if(USER.role.includes('Student') || USER.role === 'Minor') c.innerHTML += `<div class="glass p-8 rounded-[2rem] text-center border-t-4 border-cyan-500"><button onclick="UI.attendance()" class="cyber-btn !bg-white !text-black">Mark Biometric Attendance</button></div>`;
            },

            openReg(r) {
                this.regRole = r;
                this.switchView('view-register');
                document.getElementById('reg-title').innerText = `${r} Node`;
                
                const deptContainer = document.getElementById('dept-container');
                const yearSel = document.getElementById('r-year');
                
                // --- LOCKING & MANUAL LOGIC V31 ---
                if (r === 'Guest') {
                    deptContainer.innerHTML = `<input id="r-dept-manual" placeholder="Department / Organization Name">`;
                    yearSel.classList.add('hidden');
                } else if (r === 'Student') {
                    deptContainer.innerHTML = `<select id="r-dept"><option value="Computer Science">Computer Science</option><option value="Artificial Intelligence">Artificial Intelligence</option></select>`;
                    yearSel.classList.remove('hidden');
                } else if (r === 'Minor') {
                    deptContainer.innerHTML = `<select id="r-dept"><option value="Mathematics">Mathematics</option><option value="Electronics">Electronics</option></select>`;
                    yearSel.classList.remove('hidden');
                } else {
                    // Lecturer, HOD, Lab Assistant
                    deptContainer.innerHTML = `<input value="Computer Science" disabled class="opacity-50">`;
                    yearSel.classList.add('hidden');
                }

                navigator.mediaDevices.getUserMedia({ video: true }).then(s => document.getElementById('v-reg-cam').srcObject = s);
                lucide.createIcons();
            },

            async register() {
                const id = document.getElementById('r-id').value.trim();
                const name = document.getElementById('r-name').value.trim();
                const dept = (this.regRole === 'Guest') ? document.getElementById('r-dept-manual').value : (['Student', 'Minor'].includes(this.regRole) ? document.getElementById('r-dept').value : 'Computer Science');
                
                if(!id || !name || !faceData || !profileData || !dept) return alert("Complete all identity markers.");
                
                const data = { action: 'register', id, name, role: this.regRole, dept, year: document.getElementById('r-year').value, faceKey: faceData, profilePic: profileData, uuid: UUID };
                const res = await fetch(APPS_URL, { method: 'POST', body: JSON.stringify(data) });
                if(await res.text() === "DUPLICATE") return alert("ID already bound to Sovereign Node.");
                
                localStorage.setItem('csync_v31_user', JSON.stringify({ id, name, role: this.regRole, dept, photo: profileData, year: data.year }));
                location.reload();
            },

            async askAI() {
                const q = document.getElementById('ai-q').value;
                const r = document.getElementById('ai-res');
                if(!q) return;
                r.classList.remove('hidden'); r.innerText = "Consulting Groq Llama 3.3 Neural Cloud...";
                // Prime AI to feel part of the collective system
                const res = await fetch(`${APPS_URL}?action=groq&query=${encodeURIComponent("As part of the CSYNC Sovereign Ecosystem, address this: " + q)}&user=${USER.name}&role=${USER.role}`);
                r.innerText = await res.text();
            },

            switchTab(t) {
                this.switchView('view-' + t);
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('nav-active'));
                document.getElementById('nav-' + t)?.classList.add('nav-active');
                const isDash = t === 'dashboard';
                document.getElementById('btn-menu').classList.toggle('hidden', !isDash);
                document.getElementById('btn-back').classList.toggle('hidden', isDash);
                lucide.createIcons();
            },

            switchView(id) {
                document.querySelectorAll('.view-container').forEach(v => v.classList.remove('view-active'));
                document.getElementById(id).classList.add('view-active');
            },

            captureFaceKey() {
                const v = document.getElementById('v-reg-cam');
                const c = document.createElement('canvas');
                c.width = 300; c.height = 300;
                c.getContext('2d').drawImage(v, 0, 0, 300, 300);
                faceData = c.toDataURL('image/jpeg', 0.5);
                v.classList.add('hidden');
                document.getElementById('face-captured').src = faceData;
                document.getElementById('face-captured').classList.remove('hidden');
            },

            previewProfile(inp) {
                const reader = new FileReader();
                reader.onload = e => {
                    profileData = e.target.result;
                    document.getElementById('profile-preview').src = profileData;
                    document.getElementById('profile-preview').classList.remove('hidden');
                    document.getElementById('up-ico').classList.add('hidden');
                };
                reader.readAsDataURL(inp.files[0]);
            },

            toggleSidebar() {
                const sb = document.getElementById('sidebar');
                const isOpen = sb.style.transform === 'translateX(0px)';
                sb.style.transform = isOpen ? 'translateX(-100%)' : 'translateX(0px)';
            },
            logout() { localStorage.clear(); location.reload(); }
        };
        window.onload = () => UI.init();
    </script>
</body>
</html>
