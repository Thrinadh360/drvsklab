<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C-Sync | Station Terminal</title>
    
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

    <style>
        :root { --accent: #00f2ff; --bg: #000; }
        body { background: var(--bg); color: white; margin: 0; overflow: hidden; font-family: sans-serif; cursor: none; }
        
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.1); border-radius: 2rem; }
        
        /* Neural Whisper HUD */
        #whisper-hud { position: fixed; top: 10%; left: 50%; transform: translateX(-50%); width: 60%; z-index: 10000; display: none; animation: slideDown 0.5s ease; }
        @keyframes slideDown { from { transform: translate(-50%, -100%); } to { transform: translate(-50%, 0); } }

        /* Scanning Animation */
        .qr-box { position: relative; padding: 20px; background: white; border-radius: 20px; box-shadow: 0 0 50px rgba(0,242,255,0.3); }
        .scan-line { position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--accent); animation: scan 2s infinite linear; z-index: 10; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        .pc-id { font-family: 'Orbitron', sans-serif; letter-spacing: -5px; }
        .sentient-pulse { animation: pulse 4s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <!-- NEURAL WHISPER HUD (INTERCOM) -->
    <div id="whisper-hud" class="glass p-10 border-l-[10px] border-cyan-400">
        <div class="flex items-center gap-6">
            <i data-lucide="info" class="w-12 h-12 text-cyan-400 animate-pulse"></i>
            <div>
                <p class="text-cyan-400 text-[10px] font-black uppercase tracking-[0.4em] mb-2">Neural Whisper // Admin Command</p>
                <h1 id="whisper-txt" class="text-4xl font-['Orbitron'] font-black italic uppercase"></h1>
            </div>
        </div>
    </div>

    <!-- LOCKED STATE VIEW -->
    <div id="view-lock" class="h-screen flex flex-col items-center justify-center bg-[radial-gradient(circle_at_center,_#071a2e_0%,_#000_100%)]">
        <h1 id="station-id-display" class="pc-id text-[12rem] font-black text-white/5 absolute top-10 select-none">CS-01</h1>
        
        <div class="z-10 text-center">
            <div class="qr-box inline-block mb-10">
                <div class="scan-line"></div>
                <div id="qr-container"></div>
            </div>
            
            <h2 class="text-2xl font-['Orbitron'] font-black text-cyan-400 mb-2 uppercase italic sentient-pulse">Station Locked</h2>
            <p class="text-slate-500 font-bold uppercase tracking-[0.3em] text-[10px]">Scan Rotating Security Token to Synchronize</p>
            
            <div class="mt-12 flex items-center justify-center gap-6 opacity-30">
                <div class="flex items-center gap-2"><div class="w-2 h-2 bg-emerald-500 rounded-full animate-ping"></div><span class="text-[8px] font-bold uppercase">CCTV Pulse</span></div>
                <div class="flex items-center gap-2"><div class="w-2 h-2 bg-cyan-400 rounded-full"></div><span class="text-[8px] font-bold uppercase">Neural Hub Online</span></div>
            </div>
        </div>

        <button onclick="Kiosk.manualRequest()" class="absolute bottom-10 text-slate-800 text-[8px] font-black uppercase tracking-widest hover:text-slate-500 transition">Request Manual Handshake</button>
    </div>

    <!-- UNLOCKED / ACTIVE STATE VIEW -->
    <div id="view-active" class="hidden h-screen flex flex-col items-center justify-center bg-[#000]">
        <div class="glass p-16 flex items-center gap-12 border-l-[12px] border-emerald-500 max-w-4xl">
            <img id="u-photo" src="" class="w-48 h-48 rounded-full border-4 border-emerald-500/50 object-cover shadow-2xl shadow-emerald-500/20">
            <div>
                <p class="text-emerald-500 font-['Orbitron'] font-black text-[12px] mb-4 tracking-[0.4em]">NODE SESSION ACTIVE</p>
                <h1 id="u-name" class="text-7xl font-['Orbitron'] font-black uppercase italic mb-4">...</h1>
                <div class="flex items-center gap-4 text-slate-500 font-black text-xs uppercase tracking-widest">
                    <span id="session-time">00:00:00</span>
                    <span>•</span>
                    <span id="pc-id-active">CS-01</span>
                </div>
            </div>
        </div>
        <p class="mt-10 text-slate-800 font-bold text-[8px] uppercase tracking-[0.5em]">Hardware Synced // Institutional Intelligence Active</p>
    </div>

    <script>
        // MASTER CONFIG
        const API = "https://script.google.com/macros/s/AKfycbySW9SpdS5gJQ86RVbkjmFD4Y7kOe0BQW1X86escKtDcDtBLaaU9v_VEmvBnodNcRp8eg/exec";
        const PC_ID = "CS-01"; // <--- CHANGE FOR EACH PC
        let IS_OCCUPIED = false;

        const Kiosk = {
            init() {
                lucide.createIcons();
                document.getElementById('station-id-display').innerText = PC_ID;
                document.getElementById('pc-id-active').innerText = PC_ID;
                this.rotateQR();
                this.poll();
                setInterval(() => this.rotateQR(), 10000); // QR Rotates every 10s
                setInterval(() => this.cctvPulse(), 7000); // CCTV Snapshot every 7s
            },

            // 1. ROTATING SECURITY QR
            async rotateQR() {
                if (IS_OCCUPIED) return;
                try {
                    const res = await fetch(`${API}?action=get_kiosk_token&sysId=${PC_ID}`);
                    const token = await res.text();
                    document.getElementById('qr-container').innerHTML = "";
                    new QRCode(document.getElementById('qr-container'), {
                        text: JSON.stringify({ id: PC_ID, auth: token }),
                        width: 280,
                        height: 280,
                        colorDark: "#000",
                        colorLight: "#fff",
                        correctLevel: QRCode.CorrectLevel.H
                    });
                } catch (e) { console.error("Neural Link Offline."); }
            },

            // 2. SERVER POLLING (UNLOCK & WHISPERS)
            async poll() {
                try {
                    const res = await fetch(`${API}?action=kiosk_poll&sysId=${PC_ID}`);
                    const data = await res.json();

                    // Handle Neural Whisper
                    if (data.whisper) {
                        this.showWhisper(data.whisper);
                    }

                    // Handle Session State
                    if (data.status === "AUTHORIZED" && !IS_OCCUPIED) {
                        this.unlock(data);
                    } else if (data.status === "IDLE" && IS_OCCUPIED) {
                        location.reload(); // Lock back down
                    }
                } catch (e) {}
                setTimeout(() => this.poll(), 4000);
            },

            // 3. CCTV PULSE (LIVE STREAMING TO ADMIN)
            async cctvPulse() {
                try {
                    // Takes a "screenshot" of the browser view
                    const canvas = await html2canvas(document.body, { 
                        scale: 0.15, // Low scale for high-speed transmission
                        logging: false
                    });
                    const frame = canvas.toDataURL('image/jpeg', 0.1);
                    
                    fetch(API, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({ action: 'push_frame', pcId: PC_ID, frame: frame })
                    });
                } catch (e) {}
            },

            unlock(u) {
                IS_OCCUPIED = true;
                document.getElementById('view-lock').style.display = 'none';
                document.getElementById('view-active').style.display = 'flex';
                document.getElementById('u-photo').src = u.profilePic;
                document.getElementById('u-name').innerText = u.name;
                this.speak(`Welcome ${u.name}. Station ${PC_ID} successfully synchronized.`);
                this.startTimer();
            },

            showWhisper(msg) {
                const hud = document.getElementById('whisper-hud');
                document.getElementById('whisper-txt').innerText = msg;
                hud.style.display = 'block';
                this.speak(`Neural Whisper Received: ${msg}`);
                setTimeout(() => hud.style.display = 'none', 10000);
            },

            speak(txt) {
                window.speechSynthesis.cancel();
                let audio = txt.replace(/\bDr\./g, 'Doctor');
                const msg = new SpeechSynthesisUtterance(audio);
                msg.rate = 0.9; // Deep, technical voice
                msg.pitch = 0.8;
                window.speechSynthesis.speak(msg);
            },

            startTimer() {
                let seconds = 0;
                setInterval(() => {
                    seconds++;
                    let hrs = Math.floor(seconds / 3600).toString().padStart(2, '0');
                    let mins = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
                    let secs = (seconds % 60).toString().padStart(2, '0');
                    document.getElementById('session-time').innerText = `${hrs}:${mins}:${secs}`;
                }, 1000);
            },

            manualRequest() {
                const uid = prompt("ENTER YOUR NODE ID / ROLL NO:");
                if(uid) {
                    this.speak("Manual handshake requested. Awaiting administrator verification.");
                    alert("Manual authorization request transmitted to Command Hub.");
                }
            }
        };

        window.onload = () => Kiosk.init();
    </script>
</body>
</html>
