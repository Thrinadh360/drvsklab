<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CSync | Sovereign Portal</title>
    
    <!-- PWA Standard Meta -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">

    <!-- Dependencies -->
    <script src="assets/js/config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <link rel="stylesheet" href="assets/css/csync-hud.css">
    <style>
        :root { --accent: #00f2ff; --bg: #020617; --input-bg: #1e1b4b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: white; user-select: none; overflow: hidden; margin: 0; }
        
        /* 🛡️ RECTANGULAR ROUNDED INPUTS (VIVID STYLE) */
        input, textarea, select, button {
            user-select: text !important; -webkit-user-select: text !important; pointer-events: auto !important;
            background-color: var(--input-bg) !important; border: 2px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 12px !important; padding: 14px 16px !important; color: #ffffff !important;
            font-weight: 600 !important; outline: none !important; transition: all 0.3s ease;
        }
        input:focus { border-color: var(--accent) !important; box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }
        
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; }
        .cyber-card { border-top: 3px solid var(--accent); box-shadow: 0 15px 40px rgba(0, 242, 255, 0.1); }
        .app-wrapper { height: 100vh; display: flex; flex-direction: column; padding: 20px; padding-top: calc(env(safe-area-inset-top) + 10px); }
        .main-viewport { flex: 1; overflow-y: auto; padding-bottom: 160px; scroll-behavior: smooth; position: relative; }
        
        .hidden-view { display: none !important; }
        .btn-action { background: var(--accent); color: #000; font-weight: 900; padding: 16px; border-radius: 14px; width: 100%; text-transform: uppercase; border: none; cursor: pointer; }
        
        /* Side drawer */
        #sidebar { position: fixed; inset-y: 0; left: 0; width: 280px; background: #05060f; z-index: 1000; transform: translateX(-100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-right: 1px solid rgba(255,255,255,0.05); }
        #sidebar.open { transform: translateX(0); box-shadow: 20px 0 60px rgba(0,0,0,0.9); }

        .video-circle { width: 180px; height: 180px; border-radius: 50%; overflow: hidden; border: 4px solid var(--accent); margin: 0 auto; background: black; position: relative;}
        video { width: 100%; height: 100%; object-fit: cover; }

        .app-footer { position: fixed; bottom: 0; left: 0; width: 100%; padding: 15px 10px calc(15px + env(safe-area-inset-bottom)); background: #000; text-align: center; font-size: 9px; font-weight: 700; border-top: 1px solid #1e293b; z-index: 90; color: #475569; }
        a { color: var(--accent); text-decoration: underline; font-weight: 800; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- SOVEREIGN SIDEBAR -->
    <div id="sidebar" class="sidebar p-8 flex flex-col">
        <div class="mb-10 text-center">
            <h1 style="font-family:'Orbitron'" class="text-2xl text-cyan-400">CSYNC</h1>
        </div>
        <nav class="space-y-6 flex-1">
            <button onclick="switchTab('dashboard')" class="flex items-center gap-4 text-xs font-bold w-full text-left uppercase text-slate-300"><i data-lucide="layout-dashboard"></i> Dashboard</button>
            <button onclick="switchTab('nexus')" class="flex items-center gap-4 text-xs font-bold w-full text-left uppercase text-slate-300"><i data-lucide="users"></i> Nexus directory</button>
        </nav>
        <!-- MANUAL DELINK BUTTON -->
        <button onclick="delinkDevice()" class="text-red-500 text-[9px] font-black uppercase mt-10 flex items-center gap-2"><i data-lucide="log-out" class="w-3 h-3"></i> Unbind Device</button>
    </div>

    <div class="app-wrapper">
        <header class="flex justify-between items-center mb-6 pt-10">
            <button onclick="toggleSidebar()" class="p-2 active:scale-90 transition"><i data-lucide="menu" class="text-cyan-400"></i></button>
            <div class="text-center">
                <p class="text-[7px] font-bold text-slate-500 uppercase tracking-widest">Dr. V.S. Krishna GDC (A)</p>
                <h1 style="font-family: 'Orbitron';" class="text-xl font-bold tracking-tighter uppercase text-white">CSYNC</h1>
            </div>
            <img id="u-photo-top" src="https://ui-avatars.com/api/?name=CS&background=020617&color=00f2ff" class="w-10 h-10 rounded-full border border-cyan-400 object-cover shadow-lg bg-slate-900">
        </header>

        <div id="status-pill" class="mx-4 glass py-2 px-6 rounded-full text-center text-[9px] font-black uppercase tracking-widest mb-6 text-slate-500 border-slate-800">
            Node Standby...
        </div>

        <main class="main-viewport px-5">
            <!-- VIEW: ROLE SELECTION -->
            <div id="view-roles" class="hidden-view flex flex-col space-y-4 pt-4">
                <h2 class="text-center text-[10px] font-black text-slate-600 uppercase mb-4 tracking-widest">Identify Your Node</h2>
                <button onclick="pickRole('Student')" class="glass p-6 rounded-3xl text-left border-l-4 border-cyan-500 active:scale-95 transition">
                    <h4 class="font-black text-lg uppercase text-white">Student</h4>
                </button>
                <button onclick="pickRole('Alumni')" class="glass p-6 rounded-3xl text-left border-l-4 border-emerald-500 active:scale-95 transition">
                    <h4 class="font-black text-lg uppercase text-white">Alumni</h4>
                </button>
                <button onclick="pickRole('Lecturer')" class="glass p-6 rounded-3xl text-left border-l-4 border-indigo-500 active:scale-95 transition">
                    <h4 class="font-black text-lg uppercase text-white">Lecturer</h4>
                </button>
                <button onclick="pickRole('HOD')" class="glass p-6 rounded-3xl text-left border-l-4 border-purple-500 active:scale-95 transition">
                    <h4 class="font-black text-lg uppercase text-white">HOD</h4>
                </button>
            </div>

            <!-- VIEW: ENROLLMENT FORM -->
            <div id="view-register" class="hidden-view space-y-6">
                <div class="glass p-8 rounded-[2.5rem] cyber-card text-center">
                    <h2 id="reg-title" class="text-lg font-black text-cyan-400 uppercase mb-6 italic">Enrollment</h2>
                    <div class="video-circle mb-8 border-4 border-cyan-400 rounded-full overflow-hidden w-40 h-40 mx-auto"><video id="v-reg" autoplay muted playsinline></video></div>
                    <canvas id="c-resize" class="hidden"></canvas>
                    <div class="space-y-4">
                        <input id="r-id" type="text" placeholder="Roll Number" class="w-full uppercase">
                        <input id="r-name" type="text" placeholder="Full Name" class="w-full font-semibold">
                        
                        <!-- Student Specific Fields -->
                        <div id="stu-fields" class="hidden-view space-y-4">
                            <select id="r-major" class="w-full text-xs font-bold"><option>Computer Science</option><option>Artificial Intelligence</option></select>
                            <select id="r-year" class="w-full text-xs font-bold"><option value="1">1st Year</option><option value="2">2nd Year</option><option value="3">3rd Year</option><option value="4">4th Year</option></select>
                        </div>

                        <!-- Alumni Specific Fields -->
                        <div id="alu-fields" class="hidden-view space-y-4">
                            <input id="r-grad" type="number" placeholder="Year of Graduation" class="w-full">
                            <input id="r-job" type="text" placeholder="Current Occupation / Study" class="w-full">
                        </div>

                        <button onclick="processRegistration()" class="btn-action">Bind Sovereign Identity</button>
                    </div>
                </div>
            </div>

            <!-- VIEW: DASHBOARD -->
            <div id="tab-dashboard" class="hidden-view space-y-6">
                <div id="card-attendance" class="glass p-10 rounded-[3rem] text-center border-t-4 border-cyan-500">
                    <i data-lucide="fingerprint" class="w-12 h-12 mx-auto text-cyan-400 mb-4"></i>
                    <button onclick="runAttendance()" class="btn-action">Verify Daily Presence</button>
                </div>
            </div>
        </main>

        <footer class="app-footer"></footer>
    </div>

    <script>
        // Update this URL to your new backend deployment
        const BACKEND = "https://script.google.com/macros/s/AKfycbyjlfep_eavyIXgzJ4Ezru3f5odjw4M433R6cWqP419693_tFckIqTzUWsfxrp0tZtg/exec";
        let USER = JSON.parse(localStorage.getItem('csync_v1_profile'));
        let regRole = "";

        async function init() {
            lucide.createIcons();
            if (!USER) {
                switchView('view-roles');
            } else {
                switchView('tab-dashboard');
                document.getElementById('u-photo-top').src = USER.photo;
            }
        }

        function pickRole(role) {
            regRole = role;
            switchView('view-register');
            document.getElementById('reg-title').innerText = role + " Enrollment";
            document.getElementById('stu-fields').classList.toggle('hidden-view', (role !== 'Student'));
            document.getElementById('alu-fields').classList.toggle('hidden-view', (role !== 'Alumni'));
            const rId = document.getElementById('r-id');
            rId.placeholder = (role === 'Student' || role === 'Alumni') ? "Roll Number" : "Staff ID";
            navigator.mediaDevices.getUserMedia({ video: true }).then(s => document.getElementById('v-reg').srcObject = s);
        }

        async function processRegistration() {
            const canvas = document.getElementById('c-resize');
            const video = document.getElementById('v-reg');
            canvas.width = 120; canvas.height = 120;
            canvas.getContext('2d').drawImage(video, 0, 0, 120, 120);
            const photo = canvas.toDataURL('image/jpeg', 0.6);

            const payload = {
                action: "register",
                role: regRole,
                id: document.getElementById('r-id').value,
                name: document.getElementById('r-name').value,
                gradYear: document.getElementById('r-grad')?.value || "",
                job: document.getElementById('r-job')?.value || "",
                major: document.getElementById('r-major')?.value || "N/A",
                year: document.getElementById('r-year')?.value || "0",
                uuid: btoa(navigator.userAgent + screen.width),
                photo: photo
            };

            const res = await fetch(BACKEND, { method: 'POST', body: JSON.stringify(payload) });
            if ((await res.text()) === "REGISTRATION_SUCCESS") {
                localStorage.setItem('csync_v1_profile', JSON.stringify(payload));
                location.reload();
            }
        }

        async function delinkDevice() {
            if (confirm("WARNING: Unbind this ID from this phone?")) {
                const res = await fetch(BACKEND, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: "delink_device", id: USER.id, role: USER.role }) 
                });
                if ((await res.text()) === "DELINK_SUCCESS") {
                    localStorage.clear();
                    location.reload();
                }
            }
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function switchView(id) {
            document.querySelectorAll('main > div').forEach(v => v.classList.add('hidden-view'));
            document.getElementById(id).classList.remove('hidden-view');
        }

        window.onload = init;
    </script>
</body>
</html>
