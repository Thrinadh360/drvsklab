<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CSync | Sovereign Portal</title>
    
    <!-- PWA Standard Meta -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">

    <!-- Dependencies -->
    <script src="assets/js/config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

    <style>
        :root { --accent: #00f2ff; --bg: #020617; --card: rgba(30, 41, 59, 0.7); --input-bg: #1e1b4b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: white; user-select: none; overflow: hidden; margin: 0; }
        
        /* 🛡️ INPUT FOCUS PATCH */
        input, textarea, select, button { user-select: text !important; -webkit-user-select: text !important; pointer-events: auto !important; touch-action: manipulation !important; }
        
        /* HUD ELEMENTS */
        .glass { background: var(--card); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; }
        .cyber-card { border-top: 3px solid var(--accent); box-shadow: 0 20px 50px rgba(0, 242, 255, 0.15); }
        .app-wrapper { height: 100dvh; display: flex; flex-direction: column; padding: 20px; padding-top: calc(env(safe-area-inset-top) + 10px); }
        .main-viewport { flex: 1; overflow-y: auto; padding-bottom: 160px; scroll-behavior: smooth; }
        
        /* 📱 INSTAGRAM BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 85px; left: 15px; right: 15px; height: 70px; z-index: 1000; border-radius: 28px; display: flex; justify-content: space-around; align-items: center; background: rgba(15, 23, 42, 0.95); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(15px); }
        .nav-item { color: #475569; display: flex; flex-direction: column; align-items: center; font-size: 8px; font-weight: 800; text-transform: uppercase; transition: 0.3s; border: none; background: none; }
        .nav-active { color: var(--accent) !important; filter: drop-shadow(0 0 8px var(--accent)); transform: translateY(-3px); }

        .hidden-view { display: none !important; }
        .tab-view { display: none; } .tab-active { display: block !important; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .btn-action { background: var(--accent); color: #000; font-weight: 900; padding: 16px; border-radius: 14px; width: 100%; text-transform: uppercase; font-size: 11px; letter-spacing: 1.5px; border: none; }
        .app-footer { position: fixed; bottom: 0; left: 0; width: 100%; padding: 15px 10px calc(15px + env(safe-area-inset-bottom)); background: #000; text-align: center; font-size: 9px; font-weight: 700; border-top: 1px solid #1e293b; z-index: 900; color: #475569; }
        
        .video-circle { width: 170px; height: 170px; border-radius: 50%; overflow: hidden; border: 4px solid var(--accent); margin: 0 auto; background: black; position: relative;}
        video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div class="app-wrapper">
        <!-- HEADER -->
        <header class="flex justify-between items-center mb-6 pt-10">
            <button onclick="UIManager.toggleSidebar()"><i data-lucide="menu" class="text-cyan-400"></i></button>
            <h1 style="font-family:'Orbitron'" class="text-xl font-bold tracking-tighter uppercase text-white">CSYNC</h1>
            <div class="w-10 h-10 rounded-full border-2 border-cyan-400 overflow-hidden bg-slate-900 shadow-lg">
                <img id="u-photo-top" src="https://ui-avatars.com/api/?name=CS&background=020617&color=00f2ff" class="w-full h-full object-cover">
            </div>
        </header>

        <div id="status-pill" class="mx-4 glass py-2 px-6 rounded-full text-center text-[9px] font-black uppercase tracking-widest mb-6 text-slate-500 border-slate-800">
            Synchronizing Node...
        </div>

        <main class="main-viewport px-2">
            
            <!-- 1. REGISTRATION GATE (Hidden after setup) -->
            <div id="view-roles" class="hidden-view flex flex-col space-y-4 pt-4">
                <h2 class="text-center text-[10px] font-black text-slate-600 uppercase mb-4 tracking-widest">Enroll Your Identity</h2>
                <button onclick="UIManager.openReg('Student')" class="glass p-6 rounded-3xl text-left border-l-4 border-cyan-500 active:scale-95 transition">
                    <h4 class="font-black text-lg text-white">STUDENT</h4><p class="text-[9px] text-slate-400 font-bold uppercase">Batches & Attendance</p>
                </button>
                <button onclick="UIManager.openReg('Alumni')" class="glass p-6 rounded-3xl text-left border-l-4 border-emerald-500 active:scale-95 transition">
                    <h4 class="font-black text-lg text-white uppercase">Alumni</h4><p class="text-[9px] text-slate-400 font-bold uppercase">Nexus Network</p>
                </button>
                <button onclick="UIManager.openReg('Lecturer')" class="glass p-6 rounded-3xl text-left border-l-4 border-indigo-500 active:scale-95 transition">
                    <h4 class="font-black text-lg text-white uppercase">Lecturer</h4><p class="text-[9px] text-slate-400 font-bold uppercase">Academic Suite</p>
                </button>
                <button onclick="UIManager.openReg('HOD')" class="glass p-6 rounded-3xl text-left border-l-4 border-purple-500 active:scale-95 transition">
                    <h4 class="font-black text-lg text-white uppercase">HOD</h4>
                </button>
            </div>

            <div id="view-register" class="hidden-view space-y-6">
                <div class="glass p-8 rounded-[2.5rem] cyber-card text-center">
                    <div class="video-circle mb-8 border-4 border-cyan-400"><video id="v-reg" autoplay muted playsinline></video></div>
                    <canvas id="c-resize" class="hidden"></canvas>
                    <div class="space-y-4 text-left">
                        <input id="r-id" type="text" placeholder="ID Number" class="w-full uppercase font-black">
                        <input id="r-name" type="text" placeholder="Full Name" class="w-full">
                        <div id="stu-fields" class="hidden-view space-y-4">
                            <select id="r-major" class="w-full font-bold"><option>Computer Science</option><option>Artificial Intelligence</option></select>
                            <select id="r-year" class="w-full font-bold"><option value="1">1st Year</option><option value="2">2nd Year</option><option value="3">3rd Year</option><option value="4">4th Year</option></select>
                        </div>
                        <div id="alu-fields" class="hidden-view space-y-4">
                            <input id="r-grad" type="number" placeholder="Graduation Year" class="w-full">
                            <input id="r-job" type="text" placeholder="Designation / Organization" class="w-full">
                        </div>
                        <button onclick="UIManager.processRegistration()" class="btn-action w-full mt-4">Bind Sovereign Identity</button>
                    </div>
                </div>
            </div>

            <!-- 2. DASHBOARD TABS -->
            
            <!-- DASHBOARD (Attendance & Lab) -->
            <div id="view-dashboard" class="tab-view space-y-6">
                <!-- AI TERMINAL -->
                <div class="glass p-5 rounded-[2.5rem] border-indigo-500/30">
                    <div class="flex items-center gap-2 mb-3">
                        <div class="w-1.5 h-1.5 bg-cyan-400 rounded-full animate-pulse"></div>
                        <h4 class="text-[8px] font-black uppercase text-cyan-400 tracking-widest">Sovereign AI Terminal</h4>
                    </div>
                    <textarea id="ai-input" class="w-full bg-black/40 p-4 rounded-xl text-xs font-mono text-cyan-100 outline-none h-20 border border-white/5" placeholder="Command CSync AI..."></textarea>
                    <button onclick="UIManager.executeAI()" class="mt-2 text-cyan-400 font-bold text-[9px] uppercase tracking-widest flex items-center gap-2 active:scale-95 transition-all"><i data-lucide="terminal" class="w-3 h-3"></i> Execute</button>
                    <div id="ai-response" class="hidden mt-3 p-3 bg-black/60 rounded-xl text-[9px] font-mono text-slate-400 border border-white/5 leading-relaxed"></div>
                </div>

                <!-- Bento Info Card -->
                <div class="flex items-center gap-4 bg-white/5 p-4 rounded-2xl border border-white/10">
                    <img id="u-photo" src="" class="w-14 h-14 rounded-full border-2 border-cyan-500 object-cover bg-slate-900 shadow-xl">
                    <div class="text-left">
                        <h4 id="u-name" class="font-black text-sm uppercase">Candidate</h4>
                        <p id="u-meta" class="text-[8px] text-slate-500 uppercase font-black"></p>
                    </div>
                </div>

                <!-- 10-5 Action Gates -->
                <div id="module-attendance" class="glass p-10 rounded-[3rem] text-center cyber-card space-y-4">
                    <i data-lucide="map-pin" id="geo-icon" class="w-12 h-12 mx-auto text-slate-600 transition-all duration-1000"></i>
                    <p id="geo-msg" class="text-[10px] font-black uppercase text-slate-500 tracking-widest">Syncing GPS...</p>
                    <button id="btn-presence" onclick="UIManager.runAttendance()" disabled class="btn-action">Verify Presence</button>
                </div>
                
                <!-- Lab Handshake -->
                <div id="module-lab" class="hidden-view glass p-10 rounded-[3rem] text-center border-t-4 border-emerald-500">
                    <button onclick="UIManager.startLabScan()" class="btn-action !bg-white !text-black">Scan Lab PC QR</button>
                    <div id="qr-reader" class="mt-4 rounded-3xl overflow-hidden shadow-2xl"></div>
                </div>
            </div>

            <!-- NEXUS DIRECTORY -->
            <div id="view-nexus" class="tab-view space-y-6">
                <h2 class="text-xl font-black text-indigo-400 uppercase tracking-tighter italic">Nexus Directory</h2>
                <input type="text" id="nexus-search" oninput="UIManager.filterNexus()" placeholder="Neural Search..." class="w-full">
                <div id="nexus-container" class="grid grid-cols-1 gap-4"></div>
            </div>

            <!-- DISCUSSION HUB -->
            <div id="view-discuss" class="tab-view space-y-6">
                <h2 class="text-xl font-black text-purple-400 uppercase tracking-tighter italic">Discussion Feed</h2>
                <div id="discuss-container" class="space-y-4"></div>
            </div>

            <!-- ACADEMIC ARCHITECT (Staff Only) -->
            <div id="view-architect" class="tab-view space-y-6">
                <div class="glass p-8 rounded-[2.5rem] cyber-card">
                    <h2 class="text-xl font-black text-indigo-400 uppercase mb-6">AI Academic Architect</h2>
                    <div class="space-y-4">
                        <select id="arch-type" class="w-full"><option value="teaching">Teaching Plan</option><option value="exam">Exam Paper</option></select>
                        <textarea id="arch-syllabus" class="w-full h-40" placeholder="Paste syllabus text..."></textarea>
                        <button onclick="UIManager.runArchitect()" class="btn-action">Generate Document</button>
                    </div>
                </div>
            </div>

            <!-- REQUESTS & LEAVES -->
            <div id="view-requests" class="tab-view space-y-6">
                <div class="glass p-8 rounded-[2.5rem] cyber-card">
                    <h2 class="text-xl font-black text-red-500 uppercase mb-6">Leave Application</h2>
                    <textarea id="lv-reason" class="w-full h-32 mb-4" placeholder="State reason for absence..."></textarea>
                    <button onclick="UIManager.submitLeave()" class="btn-action !bg-red-600 !text-white">Submit to HOD</button>
                </div>
            </div>

        </main>

        <!-- 📱 NATIVE ICON NAVIGATION BAR -->
        <nav id="nav-bar" class="hidden-view bottom-nav glass">
            <button onclick="UIManager.switchTab('dashboard')" id="btn-dashboard" class="nav-item nav-active"><i data-lucide="shield-check"></i><span class="nav-label mt-1">Sovereign</span></button>
            <button onclick="UIManager.switchTab('nexus')" id="btn-nexus" class="nav-item"><i data-lucide="users"></i><span class="nav-label mt-1">Nexus</span></button>
            <button onclick="UIManager.switchTab('discuss')" id="btn-discuss" class="nav-item"><i data-lucide="message-square"></i><span class="nav-label mt-1">Feed</span></button>
            <button onclick="UIManager.switchTab('requests')" id="btn-requests" class="nav-item"><i data-lucide="calendar"></i><span class="nav-label mt-1">Request</span></button>
            <button onclick="UIManager.switchTab('architect')" id="btn-architect" class="nav-item hidden-view"><i data-lucide="sparkles"></i><span class="nav-label mt-1">Tools</span></button>
        </nav>

        <footer class="app-footer dynamic-footer"></footer>
    </div>

    <!-- AI VISION OVERLAY -->
    <div id="face-gate" class="hidden fixed inset-0 z-[5000] bg-black/95 flex flex-col items-center justify-center p-10 text-center pointer-events-auto">
        <div class="video-circle mb-8"><video id="v-auth" autoplay muted playsinline></video></div>
        <h3 id="face-status" class="text-cyan-400 font-black uppercase text-xs animate-pulse tracking-widest">Neural Link...</h3>
        <p class="text-slate-500 text-[9px] uppercase mt-4 italic">Neural Handshake. Smile or Blink.</p>
    </div>

    <!-- Sovereign Logic v2.0 -->
    <script src="assets/js/cloud-sync.js"></script>
    <script src="assets/js/auth-engine.js"></script>
    <script src="assets/js/scanner.js"></script>
    <script src="assets/js/ui-manager.js"></script>
</body>
</html>
