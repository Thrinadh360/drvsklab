<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CSYNC | Sovereign Portal</title>
    
    <!-- PWA Standard Meta -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">

    <!-- Dependencies -->
    <script src="assets/js/config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

    <style>
        :root { --accent: #00f2ff; --bg: #020617; --card: rgba(30, 41, 59, 0.7); --input-bg: #1e1b4b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: white; user-select: none; overflow: hidden; margin: 0; }
        
        /* 🛡️ VIVID ROUND-EDGED RECTANGLE INPUTS */
        input, textarea, select, button {
            user-select: text !important; -webkit-user-select: text !important; pointer-events: auto !important;
            background-color: var(--input-bg) !important; border: 2px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 12px !important; padding: 14px 16px !important; color: #ffffff !important;
            font-weight: 600 !important; outline: none !important; transition: all 0.3s ease;
        }
        input:focus, select:focus { border-color: var(--accent) !important; box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }
        option { background-color: #1e1b4b; color: white; }

        .glass { background: var(--card); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; }
        .cyber-card { border-top: 3px solid var(--accent); box-shadow: 0 20px 50px rgba(0, 242, 255, 0.15); }
        .app-wrapper { height: 100dvh; display: flex; flex-direction: column; padding: 20px; padding-top: calc(env(safe-area-inset-top) + 10px); }
        .main-viewport { flex: 1; overflow-y: auto; padding-bottom: 160px; scroll-behavior: smooth; }
        
        .bottom-nav { position: fixed; bottom: 85px; left: 15px; right: 15px; height: 65px; z-index: 1000; border-radius: 24px; display: flex; justify-content: space-around; align-items: center; background: rgba(15, 23, 42, 0.95); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(15px); }
        .nav-item { color: #475569; display: flex; flex-direction: column; align-items: center; font-size: 8px; font-weight: 800; text-transform: uppercase; transition: 0.3s; border: none; background: none; }
        .nav-active { color: var(--accent) !important; filter: drop-shadow(0 0 8px var(--accent)); transform: translateY(-3px); }

        .video-circle { width: 170px; height: 170px; border-radius: 50%; overflow: hidden; border: 4px solid var(--accent); margin: 0 auto; background: black; position: relative;}
        video { width: 100%; height: 100%; object-fit: cover; }

        .btn-action { background: var(--accent) !important; color: #000 !important; font-weight: 900 !important; border: none !important; cursor: pointer; border-radius: 14px !important; transition: 0.2s; }
        .btn-action:disabled { background: #1e293b !important; color: #475569 !important; opacity: 0.5; cursor: not-allowed; }
        
        .hidden-view { display: none !important; }
        .app-footer { position: fixed; bottom: 0; left: 0; width: 100%; padding: 15px 10px calc(15px + env(safe-area-inset-bottom)); background: #000; text-align: center; font-size: 9px; font-weight: 700; border-top: 1px solid #1e293b; z-index: 900; color: #475569; }
        a { color: var(--accent); text-decoration: none; font-weight: 800; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- DESKTOP GUARD -->
    <div id="desktop-blocker" class="hidden fixed inset-0 bg-black z-[9999] flex-col items-center justify-center p-10 text-center">
        <i data-lucide="smartphone" class="w-20 h-20 text-cyan-400 mb-6"></i>
        <h1 class="text-3xl font-black uppercase text-white tracking-tighter">Mobile Only</h1>
        <p class="text-slate-500 mt-4 text-sm max-w-sm">CSync requires smartphone hardware sensors and GPS to operate.</p>
    </div>

    <div class="app-wrapper">
        <header class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse shadow-[0_0_10px_#10b981]"></div>
                <p id="role-pill" class="text-[7px] font-black text-slate-500 uppercase tracking-widest">Node_Standby</p>
            </div>
            <div class="text-center">
                <p class="text-[7px] font-bold text-slate-500 uppercase tracking-widest">Dr. V.S. Krishna GDC (A)</p>
                <h1 style="font-family:'Orbitron'" class="text-xl font-bold tracking-tighter text-white uppercase">CSYNC</h1>
            </div>
            <div class="w-10 h-10 rounded-full border-2 border-cyan-400 overflow-hidden bg-slate-900 shadow-lg">
                <img id="u-photo-top" src="https://ui-avatars.com/api/?name=CS&background=020617&color=00f2ff&bold=true" class="w-full h-full object-cover">
            </div>
        </header>

        <main class="main-viewport px-5">
            
            <!-- VIEW: ROLE SELECT -->
            <div id="view-roles" class="hidden-view flex flex-col space-y-4 pt-10">
                <h2 class="text-center text-[10px] font-black text-slate-600 uppercase mb-4 tracking-widest">Identify Your Node</h2>
                <button onclick="UIManager.pickRole('Student')" class="glass p-6 rounded-3xl text-left border-l-4 border-cyan-500 active:scale-95 transition">
                    <h4 class="font-black text-lg text-white uppercase">Student</h4>
                    <p class="text-[9px] text-slate-400 uppercase font-bold">Batches & Attendance</p>
                </button>
                <button onclick="UIManager.pickRole('Alumni')" class="glass p-6 rounded-3xl text-left border-l-4 border-emerald-500 active:scale-95 transition">
                    <h4 class="font-black text-lg text-white uppercase">Alumni</h4>
                    <p class="text-[9px] text-slate-400 font-bold uppercase">Legacy Network</p>
                </button>
                <button onclick="UIManager.pickRole('Lecturer')" class="glass p-6 rounded-3xl text-left border-l-4 border-indigo-500 active:scale-95 transition">
                    <h4 class="font-black text-lg text-white uppercase">Lecturer</h4>
                    <p class="text-[9px] text-slate-400 font-bold uppercase">Faculty Suite</p>
                </button>
                <button onclick="UIManager.pickRole('LabAssistant')" class="glass p-6 rounded-3xl text-left border-l-4 border-orange-500 active:scale-95 transition">
                    <h4 class="font-black text-lg text-white uppercase">Lab Assistant</h4>
                </button>
                <button onclick="UIManager.pickRole('HOD')" class="glass p-6 rounded-3xl text-left border-l-4 border-purple-500 active:scale-95 transition">
                    <h4 class="font-black text-lg text-white uppercase">HOD</h4>
                </button>
            </div>

            <!-- VIEW: ENROLLMENT FORM -->
            <div id="view-register" class="hidden-view space-y-6">
                <div class="glass p-8 rounded-[2.5rem] cyber-card text-center">
                    <h2 id="reg-title" class="text-lg font-black text-cyan-400 uppercase mb-6 italic tracking-widest">Enrollment</h2>
                    <div class="video-circle mb-8 border-4 border-cyan-400 rounded-full overflow-hidden mx-auto">
                        <video id="v-reg" autoplay muted playsinline class="w-full h-full object-cover"></video>
                    </div>
                    <canvas id="c-resize" class="hidden"></canvas>
                    <div class="space-y-4 text-left">
                        <input id="r-id" type="text" placeholder="Roll / Staff ID" class="w-full uppercase font-black">
                        <input id="r-name" type="text" placeholder="Full Name" class="w-full font-bold">
                        
                        <!-- Student Meta -->
                        <div id="stu-fields" class="hidden space-y-4">
                            <select id="r-major" class="w-full font-bold"><option value="CS">Computer Science</option><option value="AI">Artificial Intelligence</option></select>
                            <select id="r-year" class="w-full font-bold"><option value="1">1st Year</option><option value="2">2nd Year</option><option value="3">3rd Year</option><option value="4">4th Year</option></select>
                            <input id="r-pmail" type="email" placeholder="Parent Email (Alerts)" class="w-full font-bold">
                        </div>

                        <!-- Alumni Meta -->
                        <div id="alu-fields" class="hidden space-y-4">
                            <input id="r-grad" type="number" placeholder="Graduation Year" class="w-full">
                            <input id="r-job" type="text" placeholder="Current Designation / Company" class="w-full">
                        </div>

                        <div id="reg-error" class="text-red-500 text-[10px] font-bold uppercase hidden text-center px-4"></div>
                        <button id="btn-enroll" onclick="UIManager.handleEnrollment()" class="btn-action w-full mt-4">Bind Sovereign Identity</button>
                    </div>
                </div>
            </div>

            <!-- VIEW: DASHBOARD -->
            <div id="view-dashboard" class="hidden-view space-y-6">
                <!-- AI TERMINAL -->
                <div class="glass p-5 rounded-[2.5rem] border-indigo-500/30">
                    <div class="flex items-center gap-2 mb-3">
                        <div class="w-1.5 h-1.5 bg-cyan-400 rounded-full animate-pulse"></div>
                        <h4 class="text-[8px] font-black uppercase text-cyan-400 tracking-widest">Sovereign AI Terminal</h4>
                    </div>
                    <textarea id="ai-input" class="w-full h-24" placeholder="Enter Logic Instruction..."></textarea>
                    <button onclick="UIManager.executeAI()" class="mt-3 text-cyan-400 font-bold text-[9px] uppercase tracking-widest flex items-center gap-2 active:scale-95 transition-all"><i data-lucide="terminal" class="w-3 h-3"></i> Execute</button>
                    <div id="ai-response" class="hidden mt-3 p-4 bg-black/60 rounded-2xl border border-white/5 text-[10px] font-mono text-slate-300 leading-relaxed italic"></div>
                </div>

                <!-- GPS LOCK CARD -->
                <div id="module-attendance" class="glass p-10 rounded-[3rem] text-center cyber-card space-y-4">
                    <i data-lucide="map-pin" id="geo-icon" class="w-12 h-12 mx-auto text-slate-600 transition-all"></i>
                    <p id="geo-msg" class="text-[10px] font-black uppercase text-slate-500 tracking-widest">Awaiting Location Lock...</p>
                    <button onclick="UIManager.requestGPS()" class="text-[8px] font-black uppercase text-cyan-400 underline mb-2">Sync Satellite Node</button>
                    <button id="btn-presence" onclick="UIManager.runAttendance()" disabled class="btn-action">Verify Presence</button>
                </div>

                <div id="module-lab" class="hidden-view glass p-10 rounded-[3rem] text-center border-t-4 border-emerald-500">
                    <button onclick="UIManager.startLabScan()" class="btn-action !bg-white !text-black">Scan Lab PC QR</button>
                    <div id="qr-reader" class="mt-4 rounded-3xl overflow-hidden shadow-2xl"></div>
                </div>
            </div>
        </main>

        <nav id="nav-bar" class="hidden bottom-nav">
            <button onclick="UIManager.switchTab('dashboard')" id="btn-dashboard" class="nav-item nav-active"><i data-lucide="shield-check"></i><span class="mt-1">Home</span></button>
            <button onclick="UIManager.switchTab('nexus')" id="btn-nexus" class="nav-item"><i data-lucide="users"></i><span class="mt-1">Nexus</span></button>
            <button onclick="UIManager.switchTab('discuss')" id="btn-discuss" class="nav-item"><i data-lucide="message-square"></i><span class="mt-1">Feed</span></button>
        </nav>

        <footer class="app-footer dynamic-footer"></footer>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbx9KZfFxGH8V0XdZjNMeJHO08O3GNUxCXJe96Bi1RsPhUjZ9sl5HfX37fk8CcrNuVdg/exec";
        const CAMPUS = { lat: 17.7441, lng: 83.3102 };
        const UUID = btoa(navigator.userAgent + screen.width);
        
        const UIManager = {
            user: JSON.parse(localStorage.getItem('csync_v2_profile')),
            regRole: "",

            async init() {
                lucide.createIcons();
                if (!this.user) {
                    this.switchView('view-roles');
                } else {
                    this.setupDashboard();
                }
            },

            switchView(id) {
                document.querySelectorAll('main > div').forEach(v => v.classList.add('hidden-view'));
                document.getElementById(id).classList.remove('hidden-view');
            },

            pickRole(role) {
                this.regRole = role;
                this.switchView('view-register');
                document.getElementById('reg-title').innerText = role.toUpperCase() + " ENROLLMENT";
                document.getElementById('stu-fields').style.display = (role === 'Student') ? 'block' : 'none';
                document.getElementById('alu-fields').style.display = (role === 'Alumni') ? 'block' : 'none';
                document.getElementById('r-id').placeholder = (role === 'Student' || role === 'Alumni') ? "Roll Number" : "Staff ID";
                navigator.mediaDevices.getUserMedia({ video: true }).then(s => document.getElementById('v-reg').srcObject = s);
            },

            async handleEnrollment() {
                const btn = document.getElementById('btn-enroll');
                const errBox = document.getElementById('reg-error');
                const id = document.getElementById('r-id').value;
                const name = document.getElementById('r-name').value;

                if(!id || !name) return alert("Please fill all fields.");

                try {
                    btn.disabled = true;
                    btn.innerText = "AUTHENTICATING HARDWARE...";

                    // 1. CAPTURE FACE
                    const canvas = document.getElementById('c-resize');
                    const video = document.getElementById('v-reg');
                    canvas.width = 150; canvas.height = 150;
                    canvas.getContext('2d').drawImage(video, 0, 0, 150, 150);
                    const photo = canvas.toDataURL('image/jpeg', 0.6);

                    // 2. SOVEREIGN HANDSHAKE (WebAuthn)
                    // This creates the 'Device Lock' pairing
                    const challenge = new Uint8Array(32); window.crypto.getRandomValues(challenge);
                    const cred = await navigator.credentials.create({
                        publicKey: {
                            challenge,
                            rp: { name: "CSync Dr.VSK GDC", id: window.location.hostname },
                            user: { id: Uint8Array.from(id, c => c.charCodeAt(0)), name: id, displayName: name },
                            pubKeyCredParams: [{ alg: -7, type: "public-key" }],
                            authenticatorSelection: { authenticatorAttachment: "platform", userVerification: "required" }
                        }
                    });

                    const fpId = btoa(String.fromCharCode(...new Uint8Array(cred.rawId)));

                    const payload = {
                        action: "register", role: this.regRole, id, name, uuid: UUID, photo, fpId,
                        major: document.getElementById('r-major')?.value || "N/A",
                        year: document.getElementById('r-year')?.value || "0",
                        gradYear: document.getElementById('r-grad')?.value || "",
                        job: document.getElementById('r-job')?.value || "",
                        pEmail: document.getElementById('r-pmail')?.value || "N/A"
                    };

                    const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                    const status = await res.text();

                    if (status === "REGISTRATION_SUCCESS") {
                        localStorage.setItem('csync_v2_profile', JSON.stringify(payload));
                        location.reload();
                    } else {
                        throw new Error(status);
                    }
                } catch (e) {
                    btn.disabled = false;
                    btn.innerText = "Bind Sovereign Identity";
                    errBox.innerText = "HANDSHAKE DENIED: ENABLE PHONE SCREEN LOCK (PIN/FINGERPRINT) IN DEVICE SETTINGS.";
                    errBox.classList.remove('hidden');
                }
            },

            requestGPS() {
                const status = document.getElementById('geo-msg');
                navigator.geolocation.getCurrentPosition(pos => {
                    const dist = Math.sqrt(Math.pow(pos.coords.latitude - CAMPUS.lat, 2) + Math.pow(pos.coords.longitude - CAMPUS.lng, 2)) * 111.32;
                    if (dist <= 0.8) {
                        document.getElementById('btn-presence').disabled = false;
                        status.innerHTML = `<span class="text-emerald-400">PULSE SYNCED: ON CAMPUS</span>`;
                    } else {
                        status.innerHTML = `<span class="text-red-500">OUTSIDE CAMPUS BOUNDARY</span>`;
                    }
                }, null, { enableHighAccuracy: true });
            },

            setupDashboard() {
                this.switchView('view-dashboard');
                document.getElementById('nav-bar').classList.remove('hidden');
                document.getElementById('u-photo-top').src = this.user.photo;
                document.getElementById('role-pill').innerText = this.user.role;
            }
        };

        window.onload = () => UIManager.init();
    </script>
</body>
</html>
