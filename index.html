<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CSync | Sovereign Portal</title>
    <script src="assets/js/config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <link rel="stylesheet" href="assets/css/csync-hud.css">
    <style>
        .hidden-view { display: none !important; }
        .view-active { display: block !important; animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#020617] text-white">

    <!-- 1. SOVEREIGN SIDEBAR -->
    <div id="sidebar" class="sidebar p-8 flex flex-col">
        <div class="mb-10 text-center">
            <h1 class="orbitron text-2xl text-cyan-400">CSYNC</h1>
        </div>
        <nav class="space-y-6 flex-1">
            <button onclick="UIManager.switchTab('dashboard')" class="flex items-center gap-4 text-xs font-bold w-full text-left uppercase text-slate-300"><i data-lucide="layout-dashboard"></i> Dashboard</button>
            <button onclick="UIManager.switchTab('nexus')" class="flex items-center gap-4 text-xs font-bold w-full text-left uppercase text-slate-300"><i data-lucide="users"></i> Nexus</button>
            <button onclick="UIManager.switchTab('discuss')" class="flex items-center gap-4 text-xs font-bold w-full text-left uppercase text-slate-300"><i data-lucide="message-square"></i> Feed</button>
        </nav>
        <button onclick="UIManager.forceLogout('Manual Reset')" class="text-red-500 text-[9px] font-black uppercase mt-10">Unbind Device</button>
    </div>

    <div class="app-wrapper">
        <header class="flex justify-between items-center p-6">
            <button onclick="UIManager.toggleSidebar()"><i data-lucide="menu" class="text-cyan-400"></i></button>
            <h1 class="orbitron text-xl font-bold tracking-tighter">CSYNC</h1>
            <div class="w-10 h-10 rounded-full border border-cyan-400 overflow-hidden bg-slate-900 shadow-lg">
                <img id="u-photo-top" src="https://ui-avatars.com/api/?name=CS&background=020617&color=00f2ff" class="w-full h-full object-cover">
            </div>
        </header>

        <div id="status-pill" class="mx-5 glass py-2 px-6 rounded-full text-center text-[9px] font-black uppercase tracking-widest mb-6 text-slate-500">Connecting...</div>

        <main class="main-viewport px-5">
            <!-- VIEW: ROLES (Registration) -->
            <div id="view-roles" class="hidden-view flex flex-col space-y-4">
                <h2 class="text-center text-[10px] font-black text-slate-600 uppercase mb-4">Choose Identity</h2>
                <button onclick="UIManager.openReg('Student')" class="glass p-6 rounded-3xl text-left border-l-4 border-cyan-500 active:scale-95 transition">
                    <h4 class="font-black text-lg">STUDENT</h4>
                </button>
                <button onclick="UIManager.openReg('Lecturer')" class="glass p-6 rounded-3xl text-left border-l-4 border-indigo-500 active:scale-95 transition">
                    <h4 class="font-black text-lg">LECTURER</h4>
                </button>
            </div>

            <!-- VIEW: REGISTRATION FORM -->
            <div id="view-register" class="hidden-view space-y-6">
                <div class="glass p-8 rounded-[2.5rem] cyber-card text-center">
                    <h2 id="reg-title" class="text-lg font-black text-cyan-400 uppercase mb-6 italic">Enrollment</h2>
                    <div class="video-circle mb-6"><video id="v-reg" autoplay muted playsinline></video></div>
                    <canvas id="c-resize" class="hidden"></canvas>
                    <div class="space-y-4">
                        <input id="r-id" type="text" placeholder="Roll No / Employee ID" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none uppercase font-black text-sm">
                        <input id="r-name" type="text" placeholder="Full Name" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none text-sm font-semibold">
                        <div id="stu-fields" class="hidden space-y-4">
                            <select id="r-major" class="w-full bg-slate-900 p-4 rounded-xl border border-white/10 text-xs font-bold"><option>Computer Science</option><option>Artificial Intelligence</option></select>
                            <select id="r-year" class="w-full bg-slate-900 p-4 rounded-xl border border-white/10 text-xs font-bold"><option value="1">1st Year</option><option value="2">2nd Year</option><option value="3">3rd Year</option><option value="4">4th Year</option></select>
                        </div>
                        <button onclick="UIManager.processRegistration()" class="btn-action mt-4">Bind Biometrics</button>
                    </div>
                </div>
            </div>

            <!-- VIEW: DASHBOARD (Unified) -->
            <div id="view-dashboard" class="hidden-view space-y-6">
                <!-- AI COMMAND TERMINAL (Fixed Focus) -->
                <div class="glass p-5 rounded-[2rem] border-indigo-500/30">
                    <div class="flex items-center gap-2 mb-3">
                        <div class="w-1.5 h-1.5 bg-cyan-400 rounded-full animate-pulse"></div>
                        <h4 class="text-[8px] font-black uppercase text-cyan-400 tracking-widest">Sovereign AI Terminal</h4>
                    </div>
                    <textarea id="ai-input" class="terminal-input" placeholder="Ask CSync AI..."></textarea>
                    <button onclick="UIManager.executeAI()" class="mt-3 text-cyan-400 font-bold text-[9px] uppercase tracking-widest flex items-center gap-2 active:scale-95 transition-all"><i data-lucide="terminal" class="w-3 h-3"></i> Execute_Command</button>
                    <div id="ai-response" class="hidden mt-3 p-3 bg-black/60 rounded-xl text-[9px] font-mono text-slate-400 border border-white/5 leading-relaxed"></div>
                </div>

                <div id="module-attendance" class="glass p-10 rounded-[3rem] text-center cyber-card space-y-6">
                    <i data-lucide="fingerprint" class="w-12 h-12 mx-auto text-cyan-400"></i>
                    <button onclick="UIManager.triggerAuth()" class="btn-action">Verify Daily Presence</button>
                </div>
            </div>
        </main>

        <nav id="nav-bar" class="hidden-view bottom-nav glass">
            <button onclick="UIManager.switchTab('dashboard')" id="tab-dashboard" class="nav-item nav-active"><i data-lucide="shield-check"></i></button>
            <button onclick="UIManager.switchTab('nexus')" id="tab-nexus" class="nav-item"><i data-lucide="users"></i></button>
            <button onclick="UIManager.switchTab('discuss')" id="tab-discuss" class="nav-item"><i data-lucide="message-square"></i></button>
        </nav>

        <footer class="app-footer dynamic-footer"></footer>
    </div>

    <!-- SCRIPTS -->
    <script src="assets/js/cloud-sync.js"></script>
    <script src="assets/js/auth-engine.js"></script>
    <script src="assets/js/scanner.js"></script>
    <script src="assets/js/ui-manager.js"></script>
</body>
</html>
