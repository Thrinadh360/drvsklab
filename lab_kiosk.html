<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C-Sync | Station Node</title>
    
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

    <style>
        :root { --accent: #00f2ff; --bg: #000000; }
        * { box-sizing: border-box; cursor: none !important; user-select: none; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: white; margin: 0; overflow: hidden; }
        
        /* Windows Style Background */
        .win-blur { position: fixed; inset: 0; background: url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=2070') center/cover; filter: brightness(0.3) blur(60px); transform: scale(1.1); z-index: 1; }

        .full-screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* Lock Screen QR */
        #qr-container { background: white; padding: 25px; border-radius: 30px; box-shadow: 0 0 50px rgba(0, 242, 255, 0.2); border: 10px solid rgba(0, 242, 255, 0.1); }
        
        /* Welcome Screen */
        #welcome-view { background: #000; z-index: 100; display: none; opacity: 0; }
        .profile-ring { width: 180px; height: 180px; border-radius: 50%; border: 4px solid var(--accent); padding: 5px; box-shadow: 0 0 30px rgba(0, 242, 255, 0.3); }
        .profile-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        /* Active Desktop */
        #desktop-view { display: none; background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(20px); }
        .desktop-watermark { position: absolute; font-family: 'Orbitron'; font-size: 12vw; font-weight: 900; color: rgba(255,255,255,0.03); text-transform: uppercase; pointer-events: none; }

        /* Setup UI */
        .setup-card { background: #05060f; border: 2px solid #ef4444; padding: 40px; border-radius: 30px; text-align: center; width: 400px; z-index: 1000; }
        input { background: #1e1b4b !important; border: 1px solid #334155 !important; color: white !important; padding: 15px; border-radius: 12px; width: 100%; text-align: center; font-family: 'Orbitron'; font-size: 20px; outline: none; }

        .shimmer { background: linear-gradient(90deg, #475569 25%, #00f2ff 50%, #475569 75%); background-size: 200% 100%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shimmer 2s infinite; }
        @keyframes shimmer { to { background-position: -200% 0; } }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="win-blur"></div>

    <!-- 1. INITIAL SETUP GATE (UNBOUND HARDWARE) -->
    <div id="view-setup" class="full-screen" style="display: none;">
        <div class="setup-card">
            <i data-lucide="shield-alert" class="w-12 h-12 text-red-500 mx-auto mb-4"></i>
            <h2 class="text-white font-bold mb-2 uppercase">Unbound Hardware</h2>
            <p class="text-[10px] text-slate-500 mb-8 uppercase tracking-widest">Assign Station ID to this physical node</p>
            <input type="text" id="setup-id" placeholder="e.g. CS-01">
            <button onclick="Kiosk.bind()" class="w-full bg-red-600 text-white mt-6 py-4 rounded-2xl font-black uppercase text-xs tracking-widest">Bind to Registry</button>
        </div>
    </div>

    <!-- 2. LOCK SCREEN (QR) -->
    <div id="view-lock" class="full-screen">
        <div class="text-center mb-12">
            <h1 id="display-sid" class="text-6xl font-['Orbitron'] text-cyan-400 font-black tracking-[0.4em] italic">CS-XX</h1>
            <p class="text-[10px] text-slate-400 font-bold uppercase mt-4 tracking-[0.5em]">Workstation Secured</p>
        </div>
        
        <div id="qr-container">
            <div id="qr-code"></div>
        </div>

        <div class="mt-16 text-center">
            <div class="flex items-center justify-center gap-3 mb-2">
                <div class="w-2 h-2 bg-cyan-400 rounded-full animate-ping"></div>
                <p class="text-xs font-bold uppercase tracking-widest">Awaiting Neural Handshake</p>
            </div>
            <p class="text-[9px] text-slate-600 uppercase font-black">Scan with C-Sync Mobile PWA to Unlock</p>
        </div>
    </div>

    <!-- 3. WINDOWS STYLE WELCOME SCREEN -->
    <div id="view-welcome" class="full-screen">
        <div class="profile-ring mb-8">
            <img id="w-pic" src="" class="profile-img">
        </div>
        <h2 class="text-4xl font-light text-white">Welcome, <span id="w-name" class="font-bold">...</span></h2>
        <div class="mt-8 flex items-center gap-3">
            <div class="w-4 h-4 border-2 border-cyan-400 border-t-transparent rounded-full animate-spin"></div>
            <p class="text-[10px] text-cyan-500 font-black uppercase tracking-widest">Preparing your environment</p>
        </div>
    </div>

    <!-- 4. ACTIVE DESKTOP -->
    <div id="view-desktop" class="full-screen">
        <div class="desktop-watermark">C-SYNC</div>
        
        <header class="fixed top-0 left-0 w-full p-8 flex justify-between items-center border-b border-white/5">
            <div class="flex items-center gap-4">
                <img id="d-pic" src="" class="w-12 h-12 rounded-full border border-cyan-400 object-cover">
                <div>
                    <h4 id="d-name" class="text-sm font-bold uppercase tracking-tight">...</h4>
                    <p class="text-[8px] text-cyan-600 font-black uppercase tracking-widest">Authenticated Session</p>
                </div>
            </div>
            <div class="text-right">
                <p class="text-[9px] text-red-500 font-black uppercase mb-1">Session Auto-Release</p>
                <p id="timer" class="text-3xl font-black tracking-tighter">05:00</p>
            </div>
        </header>

        <main class="text-center">
            <i data-lucide="monitor" class="w-20 h-20 text-slate-800 mx-auto mb-6"></i>
            <h1 class="text-xs font-black text-slate-500 uppercase tracking-[1em] mb-12">Station Active</h1>
            <button onclick="Kiosk.logout()" class="px-10 py-3 border border-red-500/30 text-red-500 rounded-full text-[10px] font-black uppercase hover:bg-red-500 hover:text-white transition-all">Terminate Session</button>
        </main>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxjob4JL7zw4hLK0cUQUi8jLpVzGjq7gAKpQM51zdyAbuCEqwX_SiShrql0XRSsU-xr/exec";
        
        // UNIQUE HARDWARE FINGERPRINT
        const HW_ID = btoa(navigator.userAgent + navigator.hardwareConcurrency + screen.colorDepth);
        
        let idleSecs = 0;
        let SYS_ID = localStorage.getItem('csync_station_id');

        const Kiosk = {
            async init() {
                lucide.createIcons();
                if (!SYS_ID) {
                    this.showSetup();
                } else {
                    document.getElementById('display-sid').innerText = SYS_ID;
                    new QRCode(document.getElementById("qr-code"), { text: SYS_ID, width: 220, height: 220 });
                    this.poll();
                }
                this.shield();
            },

            showSetup() {
                document.getElementById('view-lock').style.display = 'none';
                document.getElementById('view-setup').style.display = 'flex';
                document.body.style.cursor = 'default';
            },

            async bind() {
                const sid = document.getElementById('setup-id').value.trim().toUpperCase();
                if (!sid) return alert("Enter Station ID");
                
                const res = await fetch(API, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'bind_hardware', sysId: sid, hwId: HW_ID })
                });
                
                if (await res.text() === "HARDWARE_BOUND") {
                    localStorage.setItem('csync_station_id', sid);
                    location.reload();
                }
            },

            async poll() {
                try {
                    const res = await fetch(`${API}?action=kiosk_poll&sysId=${SYS_ID}&hwId=${HW_ID}`);
                    const data = await res.json();
                    if (data.status === "AUTHORIZED") {
                        this.welcome(data);
                    } else {
                        setTimeout(() => this.poll(), 3000);
                    }
                } catch(e) { setTimeout(() => this.poll(), 5000); }
            },

            welcome(user) {
                const lock = document.getElementById('view-lock');
                const welcome = document.getElementById('view-welcome');
                
                lock.style.transform = "translateY(-100%)";
                welcome.style.display = "flex";
                setTimeout(() => welcome.style.opacity = "1", 100);

                document.getElementById('w-pic').src = user.profilePic;
                document.getElementById('w-name').innerText = user.name;

                // Hold welcome screen for 4 seconds (Windows 11 feel)
                setTimeout(() => this.launchDesktop(user), 4000);
            },

            launchDesktop(user) {
                document.getElementById('view-welcome').style.opacity = "0";
                setTimeout(() => {
                    document.getElementById('view-welcome').style.display = "none";
                    document.getElementById('view-desktop').style.display = "flex";
                    document.getElementById('d-pic').src = user.profilePic;
                    document.getElementById('d-name').innerText = user.name;
                    this.startEngine();
                }, 800);
            },

            startEngine() {
                // Global movement listener for idle timer
                document.onmousemove = document.onkeydown = () => idleSecs = 0;

                setInterval(async () => {
                    idleSecs++;
                    const remaining = 300 - idleSecs;
                    document.getElementById('timer').innerText = this.fmt(remaining);
                    
                    if (remaining <= 60) document.getElementById('timer').classList.add('text-red-500', 'animate-pulse');
                    if (idleSecs >= 300) this.logout(); // Auto-logout at 5 mins
                }, 1000);
            },

            async logout() {
                await fetch(API, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: 'end_session', sysId: SYS_ID }) 
                });
                location.reload();
            },

            fmt(s) {
                const m = Math.floor(s / 60);
                const rs = s % 60;
                return `${m.toString().padStart(2,'0')}:${rs.toString().padStart(2,'0')}`;
            },

            shield() {
                // Disable common browser/windows escape keys
                window.onkeydown = e => {
                    if (["F11", "F12", "Escape"].includes(e.key)) e.preventDefault();
                };
                // Enforce fullscreen on first click
                document.body.onclick = () => {
                    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
                };
            }
        };

        window.onload = () => Kiosk.init();
    </script>
</body>
</html>
