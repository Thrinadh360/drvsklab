<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C-Sync | Station OS</title>
    
    <!-- Core Infrastructure -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

    <style>
        :root { --accent: #00f2ff; --bg: #000000; }
        * { box-sizing: border-box; user-select: none; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: white; margin: 0; overflow: hidden; cursor: none; }
        
        /* Windows 11 Fluent Backdrop */
        .win-blur { 
            position: fixed; inset: 0; 
            background: url('https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?q=80&w=1974') center/cover; 
            filter: brightness(0.2) blur(60px); 
            transform: scale(1.1); z-index: 1; 
        }

        .full-screen { 
            position: fixed; inset: 0; 
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            z-index: 10; transition: 1s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        
        /* Glass Elements */
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.1); border-radius: 2.5rem; }
        #qr-container { background: white; padding: 25px; border-radius: 2rem; box-shadow: 0 0 50px rgba(0, 242, 255, 0.2); border: 8px solid rgba(0,242,255,0.1); }
        
        /* Biometric Welcome Avatar */
        .profile-ring { 
            width: 180px; height: 180px; border-radius: 50%; 
            border: 4px solid var(--accent); padding: 6px; 
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.4);
            animation: ringPulse 2s infinite;
        }
        @keyframes ringPulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
        .profile-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background: #000; }

        /* Setup Interface */
        .setup-card { background: #05060f; border: 2px solid #ef4444; padding: 60px; border-radius: 3rem; text-align: center; width: 500px; z-index: 1000; box-shadow: 0 0 100px rgba(239, 68, 68, 0.3); }
        input { 
            background: #0f172a !important; border: 1px solid #1e293b !important; 
            color: white !important; padding: 20px !important; border-radius: 1rem !important; 
            width: 100%; text-align: center; font-family: 'Orbitron'; font-size: 28px; outline: none; 
        }

        .shimmer { 
            background: linear-gradient(90deg, transparent 25%, rgba(0, 242, 255, 0.1) 50%, transparent 75%); 
            background-size: 200% 100%; animation: shimmer 3s infinite; 
        }
        @keyframes shimmer { to { background-position: -200% 0; } }
        
        .timer-glow { font-family: 'Orbitron'; text-shadow: 0 0 10px rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="win-blur"></div>

    <!-- 1. HARDWARE BINDING GATE (Visible only on initial deploy) -->
    <div id="view-setup" class="full-screen" style="display: none;">
        <div class="setup-card">
            <div class="w-20 h-20 bg-red-600/20 rounded-full flex items-center justify-center mx-auto mb-8">
                <i data-lucide="shield-alert" class="w-10 h-10 text-red-500"></i>
            </div>
            <h2 class="text-white font-black text-3xl mb-3 uppercase font-['Orbitron'] tracking-tighter">Hardware Unbound</h2>
            <p class="text-[10px] text-slate-500 mb-10 uppercase font-bold tracking-[0.3em]">Map physical machine to Sovereign Registry</p>
            <input type="text" id="setup-id" placeholder="CS-01">
            <button onclick="Kiosk.bind()" class="w-full bg-red-600 text-white mt-10 py-5 rounded-2xl font-black uppercase text-xs tracking-[0.4em] hover:bg-red-500 transition-all shadow-xl">Initialize Hardware Link</button>
        </div>
    </div>

    <!-- 2. LOCK SCREEN (QR NODE) -->
    <div id="view-lock" class="full-screen">
        <div class="text-center mb-16">
            <h1 id="display-sid" class="text-8xl font-['Orbitron'] text-cyan-400 font-black tracking-[0.4em] italic shimmer">CS-XX</h1>
            <p class="text-[10px] text-slate-500 font-black uppercase mt-8 tracking-[1em]">Workstation Hard-Locked</p>
        </div>
        
        <div id="qr-container">
            <div id="qr-code"></div>
        </div>

        <div class="mt-20 text-center space-y-6">
            <div class="flex items-center justify-center gap-4">
                <div class="w-2.5 h-2.5 bg-cyan-400 rounded-full animate-ping"></div>
                <p class="text-sm font-black uppercase tracking-[0.4em] text-white">Neural Handshake Ready</p>
            </div>
            <p class="text-[10px] text-slate-600 uppercase font-bold tracking-widest">Authorized Mobile Node Required</p>
        </div>
    </div>

    <!-- 3. WINDOWS STYLE WELCOME SEQUENCE -->
    <div id="view-welcome" class="full-screen bg-black hidden opacity-0">
        <div class="profile-ring mb-12">
            <img id="w-pic" src="" class="profile-img">
        </div>
        <h2 class="text-5xl font-light text-white mb-3 italic">Welcome,</h2>
        <h1 id="w-name" class="text-6xl font-black text-white uppercase tracking-tight">...</h1>
        
        <div class="mt-16 flex flex-col items-center gap-6">
            <div class="w-8 h-8 border-3 border-cyan-400 border-t-transparent rounded-full animate-spin"></div>
            <p class="text-xs text-cyan-500 font-black uppercase tracking-[0.6em]">Syncing Environment...</p>
        </div>
    </div>

    <!-- 4. ACTIVE SOVEREIGN DESKTOP -->
    <div id="view-desktop" class="full-screen hidden">
        <header class="fixed top-0 left-0 w-full p-12 flex justify-between items-start z-50">
            <div class="glass p-8 flex items-center gap-8 border-l-4 border-cyan-500 shadow-2xl">
                <img id="d-pic" src="" class="w-24 h-24 rounded-full border-2 border-cyan-400 object-cover shadow-lg">
                <div>
                    <h4 id="d-name" class="text-3xl font-black uppercase text-white tracking-tighter">...</h4>
                    <div class="flex items-center gap-3 mt-2">
                        <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                        <p class="text-xs text-cyan-600 font-black uppercase tracking-widest">Handshake Verified</p>
                    </div>
                </div>
            </div>

            <div class="glass p-8 text-right border-r-4 border-red-500">
                <p class="text-[10px] text-slate-500 font-black uppercase mb-2 tracking-widest">Auto-Purge Engine</p>
                <p id="timer" class="timer-glow text-5xl font-black text-white">05:00</p>
            </div>
        </header>

        <div class="text-center opacity-5 select-none">
            <h1 class="text-[18vw] font-['Orbitron'] font-black uppercase tracking-widest">C-SYNC</h1>
            <p class="text-3xl font-black uppercase tracking-[2.5em]">Dr. VSK GDC (A)</p>
        </div>

        <footer class="fixed bottom-16 text-center w-full">
            <button onclick="Kiosk.manualLogout()" class="px-16 py-5 border-2 border-red-500/20 text-red-500 rounded-full text-xs font-black uppercase tracking-[0.3em] hover:bg-red-600 hover:text-white transition-all shadow-2xl">
                Terminate Session
            </button>
        </footer>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbySW9SpdS5gJQ86RVbkjmFD4Y7kOe0BQW1X86escKtDcDtBLaaU9v_VEmvBnodNcRp8eg/exec";
        
        // UNIQUE HARDWARE FINGERPRINT (Hardware-Level Identification)
        const HW_ID = btoa(navigator.platform + navigator.hardwareConcurrency + screen.colorDepth + (navigator.deviceMemory || "8"));
        
        let idleSecs = 0;
        let SYS_ID = "";

        const Kiosk = {
            async init() {
                lucide.createIcons();
                
                // 1. Identify PC Identity from Core Registry
                try {
                    const res = await fetch(`${API}?action=identify_pc&hwId=${HW_ID}`);
                    const identity = await res.text();

                    if (identity === "UNBOUND") {
                        this.showSetup();
                    } else {
                        SYS_ID = identity;
                        document.getElementById('display-sid').innerText = SYS_ID;
                        new QRCode(document.getElementById("qr-code"), { text: SYS_ID, width: 250, height: 250 });
                        this.poll();
                    }
                } catch(e) { 
                    document.getElementById('display-sid').innerText = "OFFLINE";
                }
                this.hardenShell();
            },

            showSetup() {
                document.getElementById('view-lock').style.display = 'none';
                document.getElementById('view-setup').style.display = 'flex';
                document.body.style.cursor = 'default';
            },

            async bind() {
                const sid = document.getElementById('setup-id').value.trim().toUpperCase();
                if (!sid.startsWith('CS-')) return alert("Syntax Error: Use CS-01 to CS-50");

                const res = await fetch(`${API}?action=bind_hardware&sysId=${sid}&hwId=${HW_ID}`);
                if (await res.text() === "HARDWARE_BOUND") {
                    location.reload();
                }
            },

            async poll() {
                try {
                    const res = await fetch(`${API}?action=kiosk_poll&sysId=${SYS_ID}&hwId=${HW_ID}`);
                    const data = await res.json();
                    if (data.status === "AUTHORIZED") {
                        this.welcome(data);
                    } else {
                        setTimeout(() => this.poll(), 3000);
                    }
                } catch(e) { setTimeout(() => this.poll(), 5000); }
            },

            welcome(user) {
                const lock = document.getElementById('view-lock');
                const welcome = document.getElementById('view-welcome');
                
                lock.style.transform = "translateY(-100%) scale(0.9)";
                lock.style.opacity = "0";
                
                setTimeout(() => {
                    lock.style.display = "none";
                    welcome.classList.remove('hidden');
                    setTimeout(() => welcome.style.opacity = "1", 50);
                    document.getElementById('w-pic').src = user.profilePic;
                    document.getElementById('w-name').innerText = user.name;
                    
                    // Windows Welcome Duration (4 seconds)
                    setTimeout(() => this.launchDesktop(user), 4000);
                }, 800);
            },

            launchDesktop(user) {
                const welcome = document.getElementById('view-welcome');
                welcome.style.opacity = "0";
                welcome.style.transform = "scale(1.1)";

                setTimeout(() => {
                    welcome.style.display = "none";
                    const dv = document.getElementById('view-desktop');
                    dv.classList.remove('hidden');
                    document.getElementById('d-pic').src = user.profilePic;
                    document.getElementById('d-name').innerText = user.name;
                    document.body.style.cursor = 'default';
                    this.startAutonomousTimer();
                }, 800);
            },

            startAutonomousTimer() {
                // Heartbeat/Reset on activity
                document.onmousemove = document.onkeydown = document.onclick = () => idleSecs = 0;

                setInterval(async () => {
                    idleSecs++;
                    const remaining = 300 - idleSecs;
                    document.getElementById('timer').innerText = this.fmt(remaining);
                    
                    if (remaining <= 60) document.getElementById('timer').classList.add('text-red-500', 'animate-pulse');
                    
                    // 5 Minute Security Purge
                    if (idleSecs >= 300) this.logout();
                    
                    // Force Shutdown Check (5 PM IST)
                    const now = new Date();
                    if(now.getHours() >= 17) this.logout();
                }, 1000);
            },

            async manualLogout() {
                if(confirm("Terminate Sovereign Session and Release Station?")) this.logout();
            },

            async logout() {
                await fetch(API, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: 'end_session', sysId: SYS_ID }) 
                });
                location.reload();
            },

            fmt(s) {
                const m = Math.floor(s / 60);
                const rs = s % 60;
                return `${m.toString().padStart(2,'0')}:${rs.toString().padStart(2,'0')}`;
            },

            hardenShell() {
                window.onkeydown = e => {
                    if (["F11", "F12", "Escape", "Tab"].includes(e.key)) e.preventDefault();
                };
                document.body.onclick = () => {
                    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
                };
            }
        };

        window.onload = () => Kiosk.init();
    </script>
</body>
</html>
