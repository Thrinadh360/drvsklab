<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Station HUD | CSync</title>
    <script src="../assets/js/config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; display: flex; align-items:center; justify-content:center; height:100vh; overflow:hidden; }
        .glass-panel { background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.08); border-top: 4px solid #00f2ff; border-radius: 60px; padding: 60px; }
        #qrcode { padding: 15px; background: white; border-radius: 20px; box-shadow: 0 0 40px rgba(0, 242, 255, 0.2); }
        .hidden-node { display: none !important; }
    </style>
</head>
<body>
    <!-- Default Lock State -->
    <div id="view-lock" class="flex flex-col items-center space-y-10 text-center">
        <header class="space-y-3">
            <p class="text-indigo-400 font-bold uppercase tracking-[0.5em] text-[11px]">Dr. V.S. Krishna Govt. Degree College (Autonomous)</p>
            <h1 style="font-family: 'Orbitron';" class="text-7xl font-black tracking-tighter italic uppercase">CSYNC</h1>
        </header>

        <div class="glass-panel w-[460px]">
            <h2 id="pc-id" style="font-family: 'Orbitron';" class="text-4xl font-black text-white mb-8 italic">CS-01</h2>
            <div id="qrcode" class="mx-auto inline-block"></div>
            <p class="text-slate-500 font-bold uppercase text-[10px] tracking-widest mt-10">Scan with Mobile App to Unlock</p>
        </div>
        <div id="clock" class="text-3xl font-mono text-slate-700 tracking-widest">00:00:00 AM</div>
    </div>

    <!-- Handshake Welcome State -->
    <div id="view-welcome" class="hidden-node flex flex-col items-center text-center">
        <img id="u-photo" src="" class="w-48 h-48 rounded-full border-8 border-indigo-600 shadow-2xl object-cover mb-8">
        <h1 style="font-family: 'Orbitron';" class="text-8xl font-black uppercase italic tracking-tighter">Welcome</h1>
        <h2 id="u-name" class="text-4xl font-bold text-indigo-400 uppercase italic">Candidate</h2>
        <p id="ai-tip" class="mt-10 text-slate-600 italic max-w-lg animate-pulse"></p>
    </div>

    <footer class="fixed bottom-10 dynamic-footer"></footer>

    <script>
        const params = new URLSearchParams(window.location.search);
        const SystemID = params.get('sysId') || "CS-01";

        async function poll() {
            const res = await fetch(`${CSYNC_CONFIG.BACKEND_URL}?action=lab`);
            const data = await res.json();
            const pc = data.find(p => p.SystemID === SystemID);
            if (pc && pc.Command === "UNLOCK") {
                document.getElementById('view-lock').classList.add('hidden-node');
                document.getElementById('view-welcome').style.display = "flex";
                const parts = pc.Status.split('|');
                document.getElementById('u-name').innerText = parts[0];
                document.getElementById('ai-tip').innerText = parts[1] || "Building the Future of CS & AI.";
                document.getElementById('u-photo').src = pc.PhotoBase64;
                lucide.createIcons();
            }
        }
        setInterval(poll, 2000);
        window.onload = () => {
            document.getElementById('pc-id').innerText = SystemID;
            new QRCode(document.getElementById("qrcode"), {
                text: `${window.location.origin}${window.location.pathname}?mode=mobile&sysId=${SystemID}`,
                width: 250, height: 250
            });
            setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString(), 1000);
            lucide.createIcons();
        };
    </script>
</body>
</html>
