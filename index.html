<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CSync | Student Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f2ff; --bg: #020617; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: white; user-select: none; overflow: hidden; margin: 0; }
        input, textarea, select { user-select: text !important; -webkit-user-select: text !important; pointer-events: auto !important; touch-action: manipulation !important; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .app-footer { position: fixed; bottom: 0; left: 0; width: 100%; padding: 15px 10px calc(15px + env(safe-area-inset-bottom)); background: rgba(0,0,0,0.9); text-align: center; font-size: 9px; font-weight: 700; border-top: 1px solid #1e293b; z-index: 100; }
        .main-scroll { padding-bottom: 140px; height: 100vh; overflow-y: auto; }
        .hidden-view { display: none !important; }
        a { color: var(--accent); text-decoration: underline; font-weight: 800; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div class="app-shell flex flex-col h-screen">
        <header class="text-center p-6">
            <p class="text-[8px] font-bold text-cyan-400 uppercase tracking-widest">Dr. V.S. Krishna Govt. Degree College (A)</p>
            <h1 style="font-family: 'Orbitron', sans-serif;" class="text-2xl font-bold tracking-tighter uppercase">CSYNC</h1>
        </header>

        <main class="main-scroll px-5 space-y-6">
            <div id="status-pill" class="glass py-2 px-6 rounded-full text-center text-[9px] font-black uppercase mb-4 text-slate-500">Syncing Node...</div>

            <!-- AI TERMINAL -->
            <div class="glass p-5 rounded-[2rem] border-indigo-500/30">
                <h4 class="text-[8px] font-black uppercase text-cyan-400 mb-3 tracking-widest">AI Sovereign Terminal</h4>
                <textarea id="ai-input" class="w-full bg-black/40 p-4 rounded-xl text-xs font-mono text-cyan-100 outline-none h-20" placeholder="Type instruction..."></textarea>
                <button onclick="executeAI()" class="mt-2 text-cyan-400 font-bold text-[9px] uppercase tracking-widest">Execute_Logic</button>
                <div id="ai-response" class="hidden mt-3 p-3 bg-black/60 rounded-xl text-[9px] font-mono text-slate-400"></div>
            </div>

            <!-- ATTENDANCE & LAB SCAN -->
            <div id="auth-gate" class="glass p-10 rounded-[3rem] text-center space-y-6">
                <i data-lucide="fingerprint" class="w-16 h-16 mx-auto text-cyan-400"></i>
                <button onclick="startBio()" class="w-full bg-cyan-500 text-black font-black py-4 rounded-2xl uppercase tracking-widest">Mark Attendance</button>
            </div>

            <div id="scanner-view" class="hidden-view glass p-10 rounded-[3rem] text-center">
                <button onclick="scanQR()" class="w-full bg-white text-black font-black py-4 rounded-2xl uppercase">Scan Lab PC QR</button>
                <div id="reader" class="mt-4 rounded-3xl overflow-hidden"></div>
            </div>
        </main>

        <footer class="app-footer">
            <p>Copyright © 2026 | Dept of Computer Science | Dr. V. S. Krishna GDC (Autonomous)</p>
            <p class="mt-1">Developed by <a href="https://linkedin.com/in/m3nadh" target="_blank">M.Thrinadh</a></p>
        </footer>
    </div>

    <script>
        const BACKEND = "https://script.google.com/macros/s/AKfycby_wVsgkv7YrahCD_8y_bNl85LqQJO4zRKH7ilSmZPinvatTeFOuHwyYKtM4WaG4kUy/exec";
        async function executeAI() {
            const input = document.getElementById('ai-input');
            const resBox = document.getElementById('ai-response');
            resBox.classList.remove('hidden'); resBox.innerText = "Processing...";
            const res = await fetch(`${BACKEND}?action=ai_helpdesk&query=${encodeURIComponent(input.value)}`);
            resBox.innerText = await res.text();
        }
        window.onload = () => lucide.createIcons();
    </script>
</body>
</html>
