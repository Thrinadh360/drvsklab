<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CSync | Sovereign Portal</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f2ff; --bg: #020617; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: white; user-select: none; overflow: hidden; margin: 0; }
        
        /* INPUT FOCUS PATCH */
        input, textarea, select { user-select: text !important; -webkit-user-select: text !important; pointer-events: auto !important; touch-action: manipulation !important; }

        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .cyber-card { border-top: 4px solid var(--accent); box-shadow: 0 15px 40px rgba(0, 242, 255, 0.1); }
        .app-footer { position: fixed; bottom: 0; left: 0; width: 100%; padding: 15px 10px calc(15px + env(safe-area-inset-bottom)); background: rgba(0,0,0,0.9); text-align: center; font-size: 9px; font-weight: 700; border-top: 1px solid #1e293b; z-index: 100; }
        .main-scroll { padding-bottom: 140px; height: 100vh; overflow-y: auto; }
        a { color: var(--accent); text-decoration: underline; font-weight: 800; }
        .hidden-view { display: none !important; }
        @media (min-width: 1024px) { #desktop-block { display: flex !important; } #app-shell { display: none; } }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div id="desktop-block" class="hidden fixed inset-0 bg-black z-[9999] flex-col items-center justify-center p-10 text-center">
        <i data-lucide="smartphone" class="w-20 h-20 text-cyan-400 mb-6"></i>
        <h1 class="text-3xl font-black uppercase">Mobile Access Only</h1>
        <p class="text-slate-400 mt-2">CSync requires a smartphone for biometric hardware binding.</p>
    </div>

    <div id="app-shell" class="flex flex-col h-screen">
        <header class="text-center p-5 pt-8">
            <p class="text-[8px] font-bold text-cyan-400 uppercase tracking-widest">Dr. V.S. Krishna Govt. Degree College (A)</p>
            <h1 style="font-family: 'Orbitron', sans-serif;" class="text-2xl font-bold tracking-tighter">CSYNC</h1>
        </header>

        <main class="main-scroll px-5">
            <!-- DYNAMIC VIEW LOADER -->
            <div id="status-pill" class="glass py-2 px-6 rounded-full text-center text-[10px] font-black uppercase mb-6 text-slate-500">Connecting...</div>
            
            <!-- Default Identity Gate -->
            <div id="gate-view" class="glass p-10 rounded-[3rem] text-center space-y-6 cyber-card">
                <i data-lucide="fingerprint" class="w-16 h-16 mx-auto text-cyan-400"></i>
                <h2 class="text-xl font-black uppercase">Identity Hub</h2>
                <button onclick="handleAuth()" class="w-full bg-cyan-500 text-black font-black py-4 rounded-2xl uppercase tracking-widest active:scale-95 transition">Authenticate</button>
            </div>
        </main>

        <footer class="app-footer">
            <p>Copyright © 2026 | Dept of Computer Science</p>
            <p>Dr. V. S. Krishna Govt. Degree College (Autonomous)</p>
            <p class="mt-1">Developed by <a href="https://linkedin.com/in/m3nadh" target="_blank">M.Thrinadh</a></p>
        </footer>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyjlfep_eavyIXgzJ4Ezru3f5odjw4M433R6cWqP419693_tFckIqTzUWsfxrp0tZtg/exec";
        window.onload = () => lucide.createIcons();
    </script>
</body>
</html>
